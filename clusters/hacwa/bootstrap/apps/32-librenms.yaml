apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: librenms
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "32"
spec:
  project: default

  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      name: librenms-mysql
      namespace: librenms
      jsonPointers:
        - /spec/volumeClaimTemplates/0/apiVersion
        - /spec/volumeClaimTemplates/0/kind

  source:
    repoURL: https://www.librenms.org/helm-charts
    chart: librenms
    targetRevision: 8.2.2
    helm:
      releaseName: librenms
      values: |
        librenms:
          existingSecret: librenms-app
          timezone: Europe/London

          configuration: |
            require_once '/data/keycloak-provider/Provider.php';
            require_once '/data/keycloak-provider/KeycloakExtendSocialite.php';

            $config['distributed_poller_group'] = '0';
            $config['distributed_poller'] = true;
            $config['base_url'] = 'https://librenms.hacwa.co.uk';

            $config['auth']['socialite']['configs']['keycloak']['listener'] = '\SocialiteProviders\Keycloak\KeycloakExtendSocialite';
            $config['auth']['socialite']['configs']['keycloak']['client_id'] = 'librenms';
            $config['auth']['socialite']['configs']['keycloak']['client_secret'] = getenv('KEYCLOAK_CLIENT_SECRET');
            $config['auth']['socialite']['configs']['keycloak']['base_url'] = 'https://keycloak.hacwa.co.uk';
            $config['auth']['socialite']['configs']['keycloak']['realms'] = 'master';
            $config['auth']['socialite']['configs']['keycloak']['redirect'] = 'https://librenms.hacwa.co.uk/auth/keycloak/callback';

            $config['auth']['socialite']['register'] = true;
            $config['auth']['socialite']['redirect'] = false;
            $config['auth']['socialite']['default_role'] = 'admin';

            $config['email_backend'] = 'smtp';
            $config['email_from'] = 'librenms-noreply@hacwa.co.uk';
            $config['email_smtp_host'] = 'smtp.fastmail.com';
            $config['email_smtp_port'] = 587;
            $config['email_smtp_secure'] = 'tls';
            $config['email_smtp_auth'] = true;
            $config['email_smtp_username'] = getenv('SMTP_USERNAME');
            $config['email_smtp_password'] = getenv('SMTP_PASSWORD');
            $config['email_smtp_timeout'] = 10;

          extraEnvs:
            - name: APP_URL
              value: https://librenms.hacwa.co.uk

            - name: APP_TRUSTED_PROXIES
              value: 172.30.0.0/16

            - name: SESSION_SECURE_COOKIE
              value: "true"

            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: librenms-app
                  key: keycloak-client-secret

            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: librenms-app
                  key: smtp-username

            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: librenms-app
                  key: smtp-password

          frontend:
            replicas: 1

            extraVolumes:
              - name: keycloak-provider
                configMap:
                  name: librenms-keycloak-provider

            extraVolumeMounts:
              - name: keycloak-provider
                mountPath: /data/keycloak-provider
                readOnly: true

          poller:
            replicas: 1

          rrdcached:
            persistence:
              enabled: true
              journal:
                storageClassName: rook-ceph-block
                size: 1Gi
              rrdcached:
                storageClassName: rook-ceph-block
                size: 20Gi

        mysql:
          enabled: true
          architecture: standalone

          auth:
            database: librenms
            username: librenms
            existingSecret: librenms-mysql-auth

          existingAuthSecret:
            name: librenms-mysql-auth
            key: mysql-user-password

          standalone:
            persistence:
              enabled: true
              storageClass: rook-ceph-block
              size: 20Gi

        redis:
          enabled: true
          architecture: standalone

          auth:
            enabled: false

        ingress:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: librenms

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
