apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nvidia-dcgm-exporter
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "27"
spec:
  project: default
  source:
    repoURL: https://nvidia.github.io/dcgm-exporter/helm-charts
    chart: dcgm-exporter
    targetRevision: 4.8.2
    helm:
      releaseName: nvidia-dcgm-exporter
      values: |
        runtimeClassName: ""

        priorityClassName: system-node-critical

        nodeSelector:
          kubernetes.io/hostname: k8s-worker-01

        tolerations:
          - key: nvidia.com/gpu
            operator: Equal
            value: "true"
            effect: NoSchedule

        serviceAccount:
          create: true
          name: ""

        kubernetes:
          enablePodLabels: true
          enablePodUID: false
          podLabelAllowlistRegex:
            - '^app$'
            - '^app\.kubernetes\.io/.*$'

        rbac:
          create: true

        extraEnv:
          - name: KUBERNETES_VIRTUAL_GPUS
            value: "true"

        customMetrics: |
          # Format:
          # DCGM FIELD, Prometheus metric type, help message

          # Clocks
          DCGM_FI_DEV_SM_CLOCK, gauge, SM clock frequency in MHz.
          DCGM_FI_DEV_MEM_CLOCK, gauge, Memory clock frequency in MHz.

          # Temperature and cooling
          DCGM_FI_DEV_MEMORY_TEMP, gauge, Memory temperature in Celsius.
          DCGM_FI_DEV_GPU_TEMP, gauge, GPU temperature in Celsius.
          DCGM_FI_DEV_FAN_SPEED, gauge, Fan speed in percent.

          # Power
          DCGM_FI_DEV_POWER_USAGE, gauge, Power draw in watts.
          DCGM_FI_DEV_TOTAL_ENERGY_CONSUMPTION, counter, Total energy consumption since boot in millijoules.

          # PCIe
          DCGM_FI_DEV_PCIE_REPLAY_COUNTER, counter, Total number of PCIe retries.

          # Utilisation
          DCGM_FI_DEV_GPU_UTIL, gauge, GPU utilisation in percent.
          DCGM_FI_DEV_MEM_COPY_UTIL, gauge, Memory utilisation in percent.
          DCGM_FI_DEV_ENC_UTIL, gauge, Encoder utilisation in percent.
          DCGM_FI_DEV_DEC_UTIL, gauge, Decoder utilisation in percent.

          # Errors
          DCGM_FI_DEV_XID_ERRORS, gauge, Value of the last XID error encountered.

          # Framebuffer memory
          DCGM_FI_DEV_FB_FREE, gauge, Framebuffer memory free in MiB.
          DCGM_FI_DEV_FB_USED, gauge, Framebuffer memory used in MiB.
          DCGM_FI_DEV_FB_RESERVED, gauge, Framebuffer memory reserved in MiB.

          # NVLink
          DCGM_FI_DEV_NVLINK_BANDWIDTH_TOTAL, counter, Total NVLink bandwidth counter for all lanes.

          # vGPU
          DCGM_FI_DEV_VGPU_LICENSE_STATUS, gauge, vGPU licence status.

          # Remapped rows
          DCGM_FI_DEV_UNCORRECTABLE_REMAPPED_ROWS, counter, Number of uncorrectable remapped rows.
          DCGM_FI_DEV_CORRECTABLE_REMAPPED_ROWS, counter, Number of correctable remapped rows.
          DCGM_FI_DEV_ROW_REMAP_FAILURE, gauge, Whether row remapping has failed.

          # Static labels
          DCGM_FI_DRIVER_VERSION, label, NVIDIA driver version.

          # Profiling
          DCGM_FI_PROF_GR_ENGINE_ACTIVE, gauge, Ratio of time the graphics engine is active.
          DCGM_FI_PROF_PIPE_TENSOR_ACTIVE, gauge, Ratio of cycles the tensor pipe is active.
          DCGM_FI_PROF_DRAM_ACTIVE, gauge, Ratio of cycles the memory interface is active.
          DCGM_FI_PROF_PCIE_TX_BYTES, gauge, PCIe transmit rate in bytes per second.
          DCGM_FI_PROF_PCIE_RX_BYTES, gauge, PCIe receive rate in bytes per second.

        service:
          enable: true
          type: ClusterIP
          port: 9400
          internalTrafficPolicy: Cluster

        serviceMonitor:
          enabled: true
          interval: 5s
          scrapeTimeout: 4s
          honorLabels: false

          additionalLabels:
            release: kube-prometheus-stack

          relabelings:
            - sourceLabels:
                - __meta_kubernetes_pod_node_name
              targetLabel: node
              action: replace

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: nvidia-dcgm-exporter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
