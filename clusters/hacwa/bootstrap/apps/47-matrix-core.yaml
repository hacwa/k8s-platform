apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: matrix-core
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "47"
spec:
  project: default
  source:
    repoURL: https://github.com/hacwa/k8s-platform.git
    targetRevision: main
    path: platform/matrix-core
  destination:
    server: https://kubernetes.default.svc
    namespace: matrix
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
