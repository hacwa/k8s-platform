apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "24"
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 2.7.0
    helm:
      values: |
        installCRDs: true

        leaderElect: true
        replicaCount: 2
        concurrent: 5

        extendedMetricLabels: true

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        podDisruptionBudget:
          enabled: true
          minAvailable: 1

        livenessProbe:
          enabled: true

        readinessProbe:
          enabled: true

        metrics:
          service:
            enabled: true
            port: 8080

        serviceMonitor:
          enabled: true
          renderMode: alwaysRender
          namespace: monitoring
          additionalLabels:
            release: kube-prometheus-stack
          interval: 30s
          scrapeTimeout: 25s

        grafanaDashboard:
          enabled: true
          sidecarLabel: grafana_dashboard
          sidecarLabelValue: "1"

        webhook:
          create: true
          replicaCount: 2

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi

          podDisruptionBudget:
            enabled: true
            minAvailable: 1

          metrics:
            service:
              enabled: true
              port: 8080

        certController:
          create: true
          replicaCount: 2

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi

          podDisruptionBudget:
            enabled: true
            minAvailable: 1

          metrics:
            service:
              enabled: true
              port: 8080
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
