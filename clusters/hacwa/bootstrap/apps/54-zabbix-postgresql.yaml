apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zabbix-postgresql
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "54"
spec:
  project: default

  source:
    repoURL: https://github.com/hacwa/k8s-platform.git
    targetRevision: main
    path: platform/zabbix-postgresql

  destination:
    server: https://kubernetes.default.svc
    namespace: zabbix

  syncPolicy:
    automated:
      prune: false
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
