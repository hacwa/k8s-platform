apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hacwa-platform-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/hacwa/k8s-platform.git
    targetRevision: main
    path: clusters/hacwa/bootstrap/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
