apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hacwa-platform-certificates
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/hacwa/k8s-platform.git
    targetRevision: main
    path: clusters/hacwa/bootstrap/apps
    directory:
      recurse: true
      include: '{03-cert-manager.yaml,04-cert-manager-config.yaml,05-envoy-gateway-crds.yaml,05-envoy-gateway.yaml,06-gateway-config.yaml,07-argocd-config.yaml,08-argocd-route.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    retry:
      limit: 12
      refresh: true
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
    syncOptions:
      - CreateNamespace=true
