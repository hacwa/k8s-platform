name: Build LibreNMS Keycloak image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - images/librenms-keycloak/**
      - .github/workflows/build-librenms-keycloak.yaml

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and publish image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish LibreNMS image
        uses: docker/build-push-action@v6
        with:
          context: images/librenms-keycloak
          push: true
          tags: |
            ghcr.io/hacwa/librenms-keycloak:26.6.1-keycloak-1
            ghcr.io/hacwa/librenms-keycloak:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
