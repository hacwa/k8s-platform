apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: librenms-app
  namespace: librenms
spec:
  refreshPolicy: Periodic
  refreshInterval: 15m
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: librenms-app
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
  data:
    - secretKey: appkey
      remoteRef:
        key: hacwa_aws_secrets
        property: LIBRENMS_APP_KEY

    - secretKey: admin-password
      remoteRef:
        key: hacwa_aws_secrets
        property: LIBRENMS_ADMIN_PASSWORD

    - secretKey: keycloak-client-secret
      remoteRef:
        key: hacwa_aws_secrets
        property: LIBRENMS_KEYCLOAK_CLIENT_SECRET

    - secretKey: smtp-username
      remoteRef:
        key: hacwa_aws_secrets
        property: LIBRENMS_SMTP_USERNAME

    - secretKey: smtp-password
      remoteRef:
        key: hacwa_aws_secrets
        property: LIBRENMS_SMTP_PASSWORD
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: librenms-mysql-auth
  namespace: librenms
spec:
  refreshPolicy: Periodic
  refreshInterval: 15m
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: librenms-mysql-auth
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
  data:
    - secretKey: mysql-root-password
      remoteRef:
        key: hacwa_aws_secrets
        property: LIBRENMS_MYSQL_ROOT_PASSWORD

    - secretKey: mysql-user-password
      remoteRef:
        key: hacwa_aws_secrets
        property: LIBRENMS_MYSQL_PASSWORD

    - secretKey: mysql-replication-password
      remoteRef:
        key: hacwa_aws_secrets
        property: LIBRENMS_MYSQL_PASSWORD
