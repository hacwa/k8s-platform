apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: librenms-app
  namespace: librenms
  labels:
    app.kubernetes.io/name: librenms
    app.kubernetes.io/component: application
spec:
  refreshPolicy: Periodic
  refreshInterval: 15m
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: librenms-app
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: librenms
          app.kubernetes.io/component: application
  data:
    - secretKey: appkey
      remoteRef:
        key: hacwa_aws_secrets
        property: LIBRENMS_APP_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None

    - secretKey: keycloak-client-secret
      remoteRef:
        key: hacwa_aws_secrets
        property: LIBRENMS_KEYCLOAK_CLIENT_SECRET
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None

    - secretKey: smtp-username
      remoteRef:
        key: hacwa_aws_secrets
        property: LIBRENMS_SMTP_USERNAME
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None

    - secretKey: smtp-password
      remoteRef:
        key: hacwa_aws_secrets
        property: LIBRENMS_SMTP_PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: librenms-mysql-auth
  namespace: librenms
  labels:
    app.kubernetes.io/name: librenms
    app.kubernetes.io/component: mysql
spec:
  refreshPolicy: Periodic
  refreshInterval: 15m
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: librenms-mysql-auth
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: librenms
          app.kubernetes.io/component: mysql
  data:
    - secretKey: mysql-root-password
      remoteRef:
        key: hacwa_aws_secrets
        property: LIBRENMS_MYSQL_ROOT_PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None

    - secretKey: mysql-user-password
      remoteRef:
        key: hacwa_aws_secrets
        property: LIBRENMS_MYSQL_PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None

    - secretKey: mysql-replication-password
      remoteRef:
        key: hacwa_aws_secrets
        property: LIBRENMS_MYSQL_PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
