apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: librenms-runtime
  namespace: librenms
  labels:
    app.kubernetes.io/name: librenms
    app.kubernetes.io/component: frontend
spec:
  refreshPolicy: Periodic
  refreshInterval: 15m
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: librenms-runtime
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: librenms
          app.kubernetes.io/component: frontend
  data:
    - secretKey: APP_KEY
      remoteRef:
        key: hacwa_aws_secrets
        property: LIBRENMS_APP_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None

    - secretKey: KEYCLOAK_CLIENT_SECRET
      remoteRef:
        key: hacwa_aws_secrets
        property: LIBRENMS_KEYCLOAK_CLIENT_SECRET
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None

    - secretKey: SMTP_USERNAME
      remoteRef:
        key: hacwa_aws_secrets
        property: LIBRENMS_SMTP_USERNAME
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None

    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: hacwa_aws_secrets
        property: LIBRENMS_SMTP_PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
