apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: auto-pool
  namespace: metallb-system
spec:
  addresses:
    - 10.0.20.8-10.0.20.16
  autoAssign: true
---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: manual-pool
  namespace: metallb-system
spec:
  addresses:
    - 10.0.20.17-10.0.20.28
  autoAssign: false
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: auto-pool-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - auto-pool
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: manual-pool-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - manual-pool
  nodeSelectors:
    - matchLabels:
        metallb-l2-20: "true"
