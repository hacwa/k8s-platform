apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: external-gateway
      namespace: platform-gateway
      sectionName: https
  hostnames:
    - argocd.hacwa.co.uk
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
