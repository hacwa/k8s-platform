apiVersion: v1
kind: ServiceAccount
metadata:
  name: ceph-dashboard-sso-bootstrap
  namespace: rook-ceph
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ceph-dashboard-sso-bootstrap
  namespace: rook-ceph
rules:
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
  - apiGroups:
      - ""
    resources:
      - pods/exec
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ceph-dashboard-sso-bootstrap
  namespace: rook-ceph
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ceph-dashboard-sso-bootstrap
subjects:
  - kind: ServiceAccount
    name: ceph-dashboard-sso-bootstrap
    namespace: rook-ceph
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ceph-dashboard-sso-bootstrap
  namespace: rook-ceph
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 2
  template:
    spec:
      serviceAccountName: ceph-dashboard-sso-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: docker.io/bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DASHBOARD_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ceph-dashboard-saml
                  key: username
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail

              TOOLBOX="deploy/rook-ceph-tools"
              CEPH_URL="https://ceph.hacwa.internal"
              KEYCLOAK_METADATA="https://keycloak.hacwa.co.uk/realms/master/protocol/saml/descriptor"
              KEYCLOAK_ENTITY_ID="https://keycloak.hacwa.co.uk/realms/master"
              USERNAME_ATTR="username"

              echo "=== Wait for rook-ceph-tools ==="
              kubectl -n rook-ceph rollout status "$TOOLBOX" --timeout=300s

              echo
              echo "=== Configure Ceph Dashboard SAML ==="
              kubectl -n rook-ceph exec "$TOOLBOX" -- bash -lc "
                set -euo pipefail

                ceph dashboard sso setup saml2 \
                  '$CEPH_URL' \
                  '$KEYCLOAK_METADATA' \
                  '$USERNAME_ATTR' \
                  '$KEYCLOAK_ENTITY_ID' >/tmp/ceph-dashboard-saml-setup.json

                ceph dashboard sso enable saml2

                ceph dashboard sso show saml2 > /tmp/saml-before.json

                python3 - <<'PY'
              import json

              d = json.load(open('/tmp/saml-before.json', 'r', encoding='utf-8'))
              s = d['onelogin_settings']
              sec = s['security']

              s['strict'] = False
              sec['authnRequestsSigned'] = False
              sec['wantAssertionsSigned'] = True
              sec['wantAssertionsEncrypted'] = False
              sec['wantMessagesSigned'] = False
              sec['wantNameIdEncrypted'] = False

              db = {
                  'protocol': 'saml2',
                  'saml2': {
                      'onelogin_settings': s
                  },
                  'version': 1
              }

              json.dump(db, open('/tmp/saml-after.json', 'w', encoding='utf-8'))
              PY

                ceph config-key set mgr/dashboard/ssodb_v1 -i /tmp/saml-after.json
              "

              echo
              echo "=== Ensure Ceph Dashboard local user exists ==="
              kubectl -n rook-ceph exec "$TOOLBOX" -- bash -lc "
                set -euo pipefail

                DASHBOARD_USERNAME='$DASHBOARD_USERNAME'
                PASS_FILE=\"/tmp/ceph-dashboard-\${DASHBOARD_USERNAME}.password\"

                openssl rand -base64 32 > \"\$PASS_FILE\"
                chmod 600 \"\$PASS_FILE\"

                if ceph dashboard ac-user-show \"\$DASHBOARD_USERNAME\" >/dev/null 2>&1; then
                  echo \"User already exists: \$DASHBOARD_USERNAME\"
                else
                  ceph dashboard ac-user-create \"\$DASHBOARD_USERNAME\" -i \"\$PASS_FILE\" administrator >/dev/null
                  echo \"Created user: \$DASHBOARD_USERNAME\"
                fi

                rm -f \"\$PASS_FILE\"

                ceph dashboard ac-user-set-roles \"\$DASHBOARD_USERNAME\" administrator >/dev/null
                ceph dashboard ac-user-show \"\$DASHBOARD_USERNAME\"
              "

              echo
              echo "=== Verify live SAML settings ==="
              if kubectl -n rook-ceph exec "$TOOLBOX" -- bash -lc "
                set -euo pipefail

                ceph dashboard sso show saml2 > /tmp/saml-live.json

                python3 - <<'PY'
              import json

              d = json.load(open('/tmp/saml-live.json', 'r', encoding='utf-8'))
              s = d['onelogin_settings']
              sec = s['security']

              print('strict =', s.get('strict'))
              print('authnRequestsSigned =', sec.get('authnRequestsSigned'))
              print('wantAssertionsSigned =', sec.get('wantAssertionsSigned'))
              print('wantAssertionsEncrypted =', sec.get('wantAssertionsEncrypted'))
              print('wantMessagesSigned =', sec.get('wantMessagesSigned'))
              print('wantNameIdEncrypted =', sec.get('wantNameIdEncrypted'))

              raise SystemExit(0 if sec.get('wantAssertionsEncrypted') is False else 1)
              PY
              "; then
                echo "Live SAML config is already correct"
                exit 0
              fi

              echo
              echo "=== Live config still stale; fail active mgr so dashboard reloads config-key ==="
              kubectl -n rook-ceph exec "$TOOLBOX" -- bash -lc '
                set -euo pipefail

                ACTIVE="$(ceph mgr dump -f json | python3 -c "import json,sys; print(json.load(sys.stdin)[\"active_name\"])")"
                echo "Failing active mgr: $ACTIVE"
                ceph mgr fail "$ACTIVE"
              '

              sleep 20

              echo
              echo "=== Verify SAML settings after mgr reload ==="
              kubectl -n rook-ceph exec "$TOOLBOX" -- bash -lc "
                set -euo pipefail

                ceph dashboard sso status
                ceph dashboard sso show saml2 > /tmp/saml-final.json

                python3 - <<'PY'
              import json

              d = json.load(open('/tmp/saml-final.json', 'r', encoding='utf-8'))
              s = d['onelogin_settings']
              sec = s['security']

              print('strict =', s.get('strict'))
              print('authnRequestsSigned =', sec.get('authnRequestsSigned'))
              print('wantAssertionsSigned =', sec.get('wantAssertionsSigned'))
              print('wantAssertionsEncrypted =', sec.get('wantAssertionsEncrypted'))
              print('wantMessagesSigned =', sec.get('wantMessagesSigned'))
              print('wantNameIdEncrypted =', sec.get('wantNameIdEncrypted'))

              if sec.get('wantAssertionsEncrypted') is not False:
                  raise SystemExit('FAILED: Ceph still requires encrypted assertions')
              PY
              "