apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jitsi-jicofo-auth
  namespace: jitsi
  labels:
    app.kubernetes.io/name: jitsi
    app.kubernetes.io/component: jicofo
spec:
  refreshPolicy: Periodic
  refreshInterval: 15m

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: jitsi-jicofo-auth
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: jitsi
          app.kubernetes.io/component: jicofo

  data:
    - secretKey: JICOFO_AUTH_PASSWORD
      remoteRef:
        key: hacwa_aws_secrets
        property: JITSI_JICOFO_AUTH_PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jitsi-jvb-auth
  namespace: jitsi
  labels:
    app.kubernetes.io/name: jitsi
    app.kubernetes.io/component: jvb
spec:
  refreshPolicy: Periodic
  refreshInterval: 15m

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: jitsi-jvb-auth
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: jitsi
          app.kubernetes.io/component: jvb

  data:
    - secretKey: JVB_AUTH_USER
      remoteRef:
        key: hacwa_aws_secrets
        property: JITSI_JVB_AUTH_USER
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None

    - secretKey: JVB_AUTH_PASSWORD
      remoteRef:
        key: hacwa_aws_secrets
        property: JITSI_JVB_AUTH_PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
