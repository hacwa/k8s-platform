apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-workflows-server-sso-secret
  namespace: argo-workflows
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    resourceNames:
      - argo-workflows-sso
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflows-server-sso-secret
  namespace: argo-workflows
subjects:
  - kind: ServiceAccount
    name: argo-workflows-server
    namespace: argo-workflows
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-workflows-server-sso-secret
