apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-workflows-sso-admin
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: >-
      'admin' in groups
    workflows.argoproj.io/rbac-rule-precedence: "10"
    workflows.argoproj.io/service-account-token.name: >-
      argo-workflows-sso-admin.service-account-token
---
apiVersion: v1
kind: Secret
metadata:
  name: argo-workflows-sso-admin.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: argo-workflows-sso-admin
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflows-sso-admin
  namespace: argo-workflows
subjects:
  - kind: ServiceAccount
    name: argo-workflows-sso-admin
    namespace: argo-workflows
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
