apiVersion: v1
kind: Service
metadata:
  name: matrix-rtc-auth
  namespace: matrix
  labels:
    app.kubernetes.io/name: matrix-rtc-auth
    app.kubernetes.io/part-of: matrix
spec:
  selector:
    app.kubernetes.io/name: matrix-rtc-auth
    app.kubernetes.io/part-of: matrix
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: matrix-rtc-auth
  namespace: matrix
  labels:
    app.kubernetes.io/name: matrix-rtc-auth
    app.kubernetes.io/part-of: matrix
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: matrix-rtc-auth
      app.kubernetes.io/part-of: matrix
  template:
    metadata:
      labels:
        app.kubernetes.io/name: matrix-rtc-auth
        app.kubernetes.io/part-of: matrix
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30

      containers:
        - name: matrix-rtc-auth
          image: ghcr.io/element-hq/lk-jwt-service:0.3.0
          imagePullPolicy: IfNotPresent
          env:
            - name: LIVEKIT_URL
              value: wss://matrix-rtc.hacwa.co.uk/livekit/sfu
            - name: LIVEKIT_KEY
              valueFrom:
                secretKeyRef:
                  name: matrix-livekit-secrets
                  key: api-key
            - name: LIVEKIT_SECRET
              valueFrom:
                secretKeyRef:
                  name: matrix-livekit-secrets
                  key: api-secret
            - name: LIVEKIT_JWT_BIND
              value: ":8080"
            - name: LIVEKIT_FULL_ACCESS_HOMESERVERS
              value: synapse.hacwa.co.uk
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
