apiVersion: v1
kind: Service
metadata:
  name: synapse
  namespace: matrix
  labels:
    app.kubernetes.io/name: synapse
    app.kubernetes.io/part-of: matrix
spec:
  selector:
    app.kubernetes.io/name: synapse
    app.kubernetes.io/part-of: matrix
  ports:
    - name: http
      port: 8008
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: synapse
  namespace: matrix
  labels:
    app.kubernetes.io/name: synapse
    app.kubernetes.io/part-of: matrix
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: synapse
      app.kubernetes.io/part-of: matrix
  template:
    metadata:
      labels:
        app.kubernetes.io/name: synapse
        app.kubernetes.io/part-of: matrix
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 991
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        - name: wait-for-postgresql
          image: postgres:16.4-bookworm
          imagePullPolicy: IfNotPresent
          command:
            - bash
            - -ec
            - |
              until pg_isready \
                -h synapse-postgresql \
                -U synapse \
                -d synapse
              do
                sleep 2
              done
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

        - name: render-config
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              python /templates/render.py \
                /templates/homeserver.yaml.template \
                /runtime/homeserver.yaml \
                __JSON_TURN_SHARED_SECRET__:/secrets/turn-shared-secret \
                __JSON_DATABASE_PASSWORD__:/secrets/database-password \
                __JSON_FORM_SECRET__:/secrets/form-secret \
                __JSON_MACAROON_SECRET__:/secrets/macaroon-secret-key \
                __JSON_REGISTRATION_SECRET__:/secrets/registration-shared-secret \
                __JSON_MAS_SHARED_SECRET__:/secrets/mas-shared-secret

              cp \
                /templates/log.config \
                /runtime/log.config

              cp \
                /secrets/signing.key \
                /runtime/element.hacwa.co.uk.signing.key

              chmod 0600 \
                /runtime/element.hacwa.co.uk.signing.key
          securityContext:
            runAsNonRoot: true
            runAsUser: 991
            runAsGroup: 991
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: runtime
              mountPath: /runtime
            - name: templates
              mountPath: /templates
              readOnly: true
            - name: secrets
              mountPath: /secrets
              readOnly: true

        - name: render-bridge-registration
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              python - <<'PY'
              import json
              import pathlib
              import re

              template = pathlib.Path(
                  "/bridge-template/registration.yaml.template"
              ).read_text()

              as_token = pathlib.Path(
                  "/bridge-secrets/as-token"
              ).read_text().rstrip("\n")

              hs_token = pathlib.Path(
                  "/bridge-secrets/hs-token"
              ).read_text().rstrip("\n")

              replacements = [
                  (
                      r"(?m)^as_token:\s*.*$",
                      "as_token: " + json.dumps(as_token),
                      "as_token",
                  ),
                  (
                      r"(?m)^hs_token:\s*.*$",
                      "hs_token: " + json.dumps(hs_token),
                      "hs_token",
                  ),
                  (
                      r"(?m)^url:\s*.*$",
                      'url: "http://mautrix-signal:29328"',
                      "url",
                  ),
              ]

              for pattern, replacement, label in replacements:
                  template, count = re.subn(
                      pattern,
                      replacement,
                      template,
                      count=1,
                  )

                  if count != 1:
                      raise SystemExit(
                          f"{label}: expected one field, found {count}"
                      )

              destination = pathlib.Path(
                  "/runtime/mautrix-signal-registration.yaml"
              )

              destination.write_text(template)
              destination.chmod(0o600)
              PY
          securityContext:
            runAsNonRoot: true
            runAsUser: 991
            runAsGroup: 991
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: runtime
              mountPath: /runtime

            - name: bridge-registration-template
              mountPath: /bridge-template
              readOnly: true

            - name: bridge-registration-secrets
              mountPath: /bridge-secrets
              readOnly: true

      containers:
        - name: synapse
          image: matrixdotorg/synapse:v1.148.0
          imagePullPolicy: IfNotPresent
          env:
            - name: SYNAPSE_CONFIG_PATH
              value: /data/homeserver.yaml
          ports:
            - name: http
              containerPort: 8008
              protocol: TCP
          startupProbe:
            httpGet:
              path: /_matrix/client/versions
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /_matrix/client/versions
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /_matrix/client/versions
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            runAsNonRoot: true
            runAsUser: 991
            runAsGroup: 991
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: runtime
              mountPath: /data
            - name: media
              mountPath: /data/media_store

      volumes:
        - name: runtime
          emptyDir: {}

        - name: templates
          configMap:
            name: matrix-synapse-config

        - name: secrets
          projected:
            defaultMode: 0440
            sources:
              - secret:
                  name: matrix-postgresql-auth
                  items:
                    - key: synapse-password
                      path: database-password

              - secret:
                  name: matrix-synapse-secrets
                  items:
                    - key: form-secret
                      path: form-secret
                    - key: macaroon-secret-key
                      path: macaroon-secret-key
                    - key: registration-shared-secret
                      path: registration-shared-secret
                    - key: signing.key
                      path: signing.key
                    - key: turn-shared-secret
                      path: turn-shared-secret
                    - key: mas-shared-secret
                      path: mas-shared-secret

        - name: bridge-registration-template
          configMap:
            name: matrix-mautrix-signal-config
            items:
              - key: registration.yaml.template
                path: registration.yaml.template

        - name: bridge-registration-secrets
          projected:
            defaultMode: 0440
            sources:
              - secret:
                  name: matrix-mautrix-signal-secrets
                  items:
                    - key: as-token
                      path: as-token
                    - key: hs-token
                      path: hs-token

        - name: media
          persistentVolumeClaim:
            claimName: matrix-synapse-media
