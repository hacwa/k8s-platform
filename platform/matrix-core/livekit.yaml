apiVersion: v1
kind: Service
metadata:
  name: livekit
  namespace: matrix
  labels:
    app.kubernetes.io/name: livekit
    app.kubernetes.io/part-of: matrix
spec:
  selector:
    app.kubernetes.io/name: livekit
    app.kubernetes.io/part-of: matrix
  ports:
    - name: signaling
      port: 7880
      targetPort: signaling
      protocol: TCP
    - name: rtc-tcp
      port: 7881
      targetPort: rtc-tcp
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit
  namespace: matrix
  labels:
    app.kubernetes.io/name: livekit
    app.kubernetes.io/part-of: matrix
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: livekit
      app.kubernetes.io/part-of: matrix
  template:
    metadata:
      labels:
        app.kubernetes.io/name: livekit
        app.kubernetes.io/part-of: matrix
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 60

      initContainers:
        - name: render-config
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              python /templates/render.py \
                /templates/livekit.yaml.template \
                /runtime/livekit.yaml \
                __LIVEKIT_KEY__:/secrets/api-key \
                __LIVEKIT_SECRET__:/secrets/api-secret
          volumeMounts:
            - name: runtime
              mountPath: /runtime
            - name: templates
              mountPath: /templates
              readOnly: true
            - name: secrets
              mountPath: /secrets
              readOnly: true

      containers:
        - name: livekit
          image: livekit/livekit-server:v1.9.11
          imagePullPolicy: IfNotPresent
          args:
            - --config
            - /etc/livekit.yaml
          ports:
            - name: signaling
              containerPort: 7880
              protocol: TCP
            - name: rtc-tcp
              containerPort: 7881
              protocol: TCP
          startupProbe:
            tcpSocket:
              port: signaling
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: signaling
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: signaling
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: runtime
              mountPath: /etc/livekit.yaml
              subPath: livekit.yaml
              readOnly: true

      volumes:
        - name: runtime
          emptyDir: {}

        - name: templates
          configMap:
            name: matrix-livekit-config

        - name: secrets
          secret:
            secretName: matrix-livekit-secrets
            defaultMode: 0440
