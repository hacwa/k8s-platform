apiVersion: v1
kind: Service
metadata:
  name: mas
  namespace: matrix
  labels:
    app.kubernetes.io/name: mas
    app.kubernetes.io/part-of: matrix
spec:
  selector:
    app.kubernetes.io/name: mas
    app.kubernetes.io/part-of: matrix
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mas
  namespace: matrix
  labels:
    app.kubernetes.io/name: mas
    app.kubernetes.io/part-of: matrix
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mas
      app.kubernetes.io/part-of: matrix
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mas
        app.kubernetes.io/part-of: matrix
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        - name: wait-for-postgresql
          image: postgres:16.4-bookworm
          imagePullPolicy: IfNotPresent
          command:
            - bash
            - -ec
            - |
              until pg_isready \
                -h synapse-postgresql \
                -U mas \
                -d mas
              do
                sleep 2
              done
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: matrix-postgresql-auth
                  key: mas-password
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

        - name: render-config
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              python /templates/render-mas.py \
                /templates/mas-config.yaml.template \
                /runtime/config.yaml \
                /source-secrets/database-password \
                /source-secrets/shared-secret \
                /source-secrets/keycloak-client-secret \
                /runtime/secrets

              cp \
                /source-secrets/encryption-key \
                /runtime/secrets/encryption.key

              cp \
                /source-secrets/signing-key \
                /runtime/secrets/mas-signing.key

              chmod 0600 \
                /runtime/secrets/encryption.key \
                /runtime/secrets/mas-signing.key
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: runtime
              mountPath: /runtime

            - name: templates
              mountPath: /templates
              readOnly: true

            - name: source-secrets
              mountPath: /source-secrets
              readOnly: true

      containers:
        - name: mas
          image: ghcr.io/element-hq/matrix-authentication-service:1.4.1
          imagePullPolicy: IfNotPresent
          args:
            - -c
            - /data/config.yaml
            - server
          env:
            - name: SSL_CERT_FILE
              value: /etc/ssl/certs/ca-certificates.crt
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: runtime
              mountPath: /data

      volumes:
        - name: runtime
          emptyDir: {}

        - name: templates
          configMap:
            name: matrix-mas-config

        - name: source-secrets
          projected:
            defaultMode: 0440
            sources:
              - secret:
                  name: matrix-postgresql-auth
                  items:
                    - key: mas-password
                      path: database-password

              - secret:
                  name: matrix-mas-secrets
                  items:
                    - key: shared-secret
                      path: shared-secret
                    - key: encryption-key
                      path: encryption-key
                    - key: signing.key
                      path: signing-key
                    - key: keycloak-client-secret
                      path: keycloak-client-secret
