apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  admin.enabled: "true"
  url: https://argocd.hacwa.co.uk
  users.session.duration: "24h"

  resource.customizations.health.ceph.rook.io_CephCluster: |
    hs = {}
    hs.status = "Progressing"
    hs.message = "Waiting for Ceph cluster to become ready"

    if obj.status == nil then
      return hs
    end

    local ceph_health = ""

    if obj.status.ceph ~= nil
      and obj.status.ceph.health ~= nil
    then
      ceph_health = obj.status.ceph.health
    end

    if ceph_health == "HEALTH_ERR" then
      hs.status = "Degraded"
      hs.message = "Ceph reports HEALTH_ERR"
      return hs
    end

    if obj.status.conditions ~= nil then
      for _, condition in ipairs(obj.status.conditions) do
        if condition.type == "Ready"
          and condition.status == "True"
        then
          hs.status = "Healthy"

          if ceph_health == "HEALTH_WARN" then
            hs.message = "Ceph is ready; HEALTH_WARN does not gate platform sync"
          elseif condition.message ~= nil then
            hs.message = condition.message
          else
            hs.message = "Ceph cluster is ready"
          end

          return hs
        end
      end
    end

    if obj.status.phase == "Failure"
      or obj.status.state == "Error"
    then
      hs.status = "Degraded"
      hs.message = obj.status.message or "Ceph cluster failed"
      return hs
    end

    if obj.status.message ~= nil then
      hs.message = obj.status.message
    end

    return hs

  oidc.config: |
    name: Keycloak
    issuer: https://keycloak.hacwa.co.uk/realms/master
    clientID: argocd
    enablePKCEAuthentication: true
    requestedScopes:
      - openid
      - profile
      - email
      - groups
