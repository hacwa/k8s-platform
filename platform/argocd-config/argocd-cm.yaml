apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  admin.enabled: "true"
  url: https://argocd.hacwa.co.uk
  users.session.duration: "24h"

  resource.customizations.health.argoproj.io_Application: |
    hs = {}
    hs.status = "Progressing"
    hs.message = ""

    if obj.metadata ~= nil
      and obj.metadata.annotations ~= nil
      and obj.metadata.annotations["argocd.argoproj.io/ignore-healthcheck"] == "true"
    then
      hs.status = "Healthy"
      hs.message = "Child Application health ignored for parent sync waves"
      return hs
    end

    if obj.status ~= nil then
      if obj.status.health ~= nil then
        hs.status = obj.status.health.status
        if obj.status.health.message ~= nil then
          hs.message = obj.status.health.message
        end
      end
    end

    return hs

  oidc.config: |
    name: Keycloak
    issuer: https://keycloak.hacwa.co.uk/realms/master
    clientID: argocd
    enablePKCEAuthentication: true
    requestedScopes:
      - openid
      - profile
      - email
      - groups
