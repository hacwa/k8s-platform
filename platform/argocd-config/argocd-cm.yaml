apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  admin.enabled: "true"
  url: https://argocd.hacwa.co.uk
  users.session.duration: "24h"

  resource.customizations.health.argoproj.io_Application: |
    hs = {}
    hs.status = "Progressing"
    hs.message = ""

    if obj.status ~= nil then
      if obj.status.health ~= nil then
        hs.status = obj.status.health.status

        if obj.status.health.message ~= nil then
          hs.message = obj.status.health.message
        end
      end
    end

    return hs

  resource.exclusions: |
    - apiGroups:
        - ""
      kinds:
        - Endpoints
      clusters:
        - "*"

    - apiGroups:
        - coordination.k8s.io
      kinds:
        - Lease
      clusters:
        - "*"

    - apiGroups:
        - authentication.k8s.io
        - authorization.k8s.io
      kinds:
        - SelfSubjectReview
        - TokenReview
        - LocalSubjectAccessReview
        - SelfSubjectAccessReview
        - SelfSubjectRulesReview
        - SubjectAccessReview
      clusters:
        - "*"

    - apiGroups:
        - certificates.k8s.io
      kinds:
        - CertificateSigningRequest
      clusters:
        - "*"

    - apiGroups:
        - cert-manager.io
      kinds:
        - CertificateRequest
      clusters:
        - "*"

    - apiGroups:
        - cilium.io
      kinds:
        - CiliumIdentity
        - CiliumEndpoint
        - CiliumEndpointSlice
      clusters:
        - "*"

    - apiGroups:
        - kyverno.io
        - reports.kyverno.io
        - wgpolicyk8s.io
      kinds:
        - PolicyReport
        - ClusterPolicyReport
        - EphemeralReport
        - ClusterEphemeralReport
        - AdmissionReport
        - ClusterAdmissionReport
        - BackgroundScanReport
        - ClusterBackgroundScanReport
        - UpdateRequest
      clusters:
        - "*"

  resource.customizations.health.ceph.rook.io_CephCluster: |
    hs = {}
    hs.status = "Progressing"
    hs.message = "Waiting for CephCluster Ready=True"

    if obj.status ~= nil then
      if obj.status.state == "Error"
        or obj.status.phase == "Failure"
      then
        hs.status = "Degraded"
        hs.message = obj.status.message or "CephCluster failed"
        return hs
      end

      if obj.status.ceph ~= nil
        and obj.status.ceph.health == "HEALTH_ERR"
      then
        hs.status = "Degraded"
        hs.message = "Ceph reports HEALTH_ERR"
        return hs
      end

      if obj.status.conditions ~= nil then
        for _, condition in ipairs(obj.status.conditions) do
          if condition.type == "Ready"
            and condition.status == "True"
          then
            hs.status = "Healthy"
            hs.message = "CephCluster is ready"
            return hs
          end
        end
      end
    end

    return hs

  oidc.config: |
    name: Keycloak
    issuer: https://keycloak.hacwa.co.uk/realms/master
    clientID: argocd
    enablePKCEAuthentication: true
    requestedScopes:
      - openid
      - profile
      - email
      - groups
