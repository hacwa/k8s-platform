apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - argocd-cm.yaml
  - argocd-rbac-cm.yaml
  - argocd-cmd-params-cm.yaml
  - argocd-servicemonitors.yaml
  - argocd-prometheusrules.yaml

configMapGenerator:
  - name: argocd-grafana-dashboard
    namespace: monitoring
    files:
      - argocd-dashboard.json=dashboards/argocd-dashboard.json

generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: "1"
