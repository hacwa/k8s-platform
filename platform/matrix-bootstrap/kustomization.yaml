apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

resources:
  - external-secrets.yaml

configMapGenerator:
  - name: matrix-mautrix-signal-config
    files:
      - render-mautrix.rb=mautrix-signal/render-mautrix.rb
      - config.yaml.template=mautrix-signal/config.yaml.template
      - registration.yaml.template=mautrix-signal/registration.yaml.template
