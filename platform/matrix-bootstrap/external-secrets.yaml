apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: matrix-postgresql-auth
  namespace: matrix
  labels:
    app.kubernetes.io/name: matrix
    app.kubernetes.io/component: postgresql
spec:
  refreshPolicy: Periodic
  refreshInterval: 15m0s
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: matrix-postgresql-auth
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
      mergePolicy: Replace
      metadata:
        labels:
          app.kubernetes.io/name: matrix
          app.kubernetes.io/component: postgresql
  data:
    - secretKey: postgres-password
      remoteRef:
        key: hacwa_aws_secrets
        property: MATRIX_POSTGRES_SYNAPSE_PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: synapse-password
      remoteRef:
        key: hacwa_aws_secrets
        property: MATRIX_POSTGRES_SYNAPSE_PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: mas-password
      remoteRef:
        key: hacwa_aws_secrets
        property: MATRIX_POSTGRES_MAS_PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: mautrix-signal-password
      remoteRef:
        key: hacwa_aws_secrets
        property: MATRIX_POSTGRES_MAUTRIX_SIGNAL_PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
