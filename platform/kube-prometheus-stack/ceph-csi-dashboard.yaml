apiVersion: v1
kind: ConfigMap
metadata:
  name: ceph-csi-grafana-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  ceph-csi-rbd.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "id": 1,
          "title": "CSI liveness targets",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "sum(csi_liveness{namespace=\"rook-ceph\"})",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Pending Ceph PVCs",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "count( ( kube_persistentvolumeclaim_status_phase{ phase=\"Pending\" } == 1 ) and on(namespace, persistentvolumeclaim) ( kube_persistentvolumeclaim_info{ storageclass=\"rook-ceph-block\" } == 1 ) )",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Lost Ceph PVCs",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 12,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "count( ( kube_persistentvolumeclaim_status_phase{ phase=\"Lost\" } == 1 ) and on(namespace, persistentvolumeclaim) ( kube_persistentvolumeclaim_info{ storageclass=\"rook-ceph-block\" } == 1 ) )",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Unattached RBD volumes",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 18,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "count( ( kube_volumeattachment_status_attached == 0 ) and on(volumeattachment) ( kube_volumeattachment_info{ attacher=\"rook-ceph.rbd.csi.ceph.com\" } == 1 ) )",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "Ceph CSI liveness",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 5
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "table",
              "placement": "right",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "max by (pod, instance) (csi_liveness{namespace=\"rook-ceph\"})",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "title": "Ceph PVC utilisation",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 14
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "table",
              "placement": "right",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "( 100 * kubelet_volume_stats_used_bytes / clamp_min( kubelet_volume_stats_capacity_bytes, 1 ) ) * on(namespace, persistentvolumeclaim) group_left(storageclass) kube_persistentvolumeclaim_info{ storageclass=\"rook-ceph-block\" }",
              "legendFormat": "{{namespace}}/{{persistentvolumeclaim}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "title": "Ceph PVC available capacity",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 23
          },
          "fieldConfig": {
            "defaults": {
              "unit": "gbytes"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "table",
              "placement": "right",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "( kubelet_volume_stats_available_bytes / 1024 / 1024 / 1024 ) * on(namespace, persistentvolumeclaim) group_left(storageclass) kube_persistentvolumeclaim_info{ storageclass=\"rook-ceph-block\" }",
              "legendFormat": "{{namespace}}/{{persistentvolumeclaim}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "title": "RBD volume attachment state",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 32
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "table",
              "placement": "right",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "kube_volumeattachment_status_attached * on(volumeattachment) group_left(attacher, node) kube_volumeattachment_info{attacher=\"rook-ceph.rbd.csi.ceph.com\"}",
              "legendFormat": "{{volumeattachment}} on {{node}}",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 40,
      "tags": [
        "ceph",
        "csi",
        "rbd",
        "gitops"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timezone": "browser",
      "title": "Ceph CSI / RBD",
      "uid": "ceph-csi-rbd",
      "version": 1
    }
