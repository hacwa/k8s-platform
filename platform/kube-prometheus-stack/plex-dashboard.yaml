        {"id":16,"type":"timeseries","title":"Exporter errors and retries","description":"Five-minute rates; zero is healthy.","datasource":{"type":"prometheus","uid":"prometheus"},"gridPos":{"x":0,"y":41,"w":12,"h":8},"fieldConfig":{"defaults":{"unit":"ops","min":0},"overrides":[]},"options":{"legend":{"displayMode":"table","placement":"right","showLegend":true,"calcs":["lastNotNull","min","max","mean"]},"tooltip":{"mode":"multi","sort":"desc"}},"targets":[{"editorMode":"code","expr":"sum by (type) (rate(plex_exporter_errors_total[5m]))","legendFormat":"Errors: {{type}}","refId":"A","range":true},{"editorMode":"code","expr":"sum(rate(plex_http_retries_total[5m]))","legendFormat":"HTTP retries","refId":"B","range":true}]},
