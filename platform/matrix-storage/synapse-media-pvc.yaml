apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: matrix-synapse-media
  namespace: matrix
  labels:
    app.kubernetes.io/name: matrix
    app.kubernetes.io/component: synapse
    app.kubernetes.io/part-of: matrix
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: rook-ceph-block
  resources:
    requests:
      storage: 20Gi
