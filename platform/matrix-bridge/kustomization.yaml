apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

resources:
  - mautrix-signal.yaml

configMapGenerator:
  - name: matrix-mautrix-signal-config
    files:
      - render-mautrix.rb=tools/render-mautrix.rb
      - config.yaml.template=config/config.yaml.template
      - registration.yaml.template=config/registration.yaml.template
