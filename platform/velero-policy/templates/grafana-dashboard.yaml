{{- if .Values.dashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: velero-grafana-dashboard
  namespace: {{ .Values.dashboard.namespace }}
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: velero-policy
    app.kubernetes.io/part-of: velero
data:
  velero-overview.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "description": "Whether Velero can currently access the configured MinIO BackupStorageLocation.",
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "options": {
                    "0": {
                      "text": "Unavailable"
                    },
                    "1": {
                      "text": "Available"
                    }
                  },
                  "type": "value"
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "editorMode": "code",
              "expr": "max(velero_backup_location_status_gauge{namespace=\"velero\",backup_location_name=\"default\"})",
              "instant": true,
              "legendFormat": "Storage",
              "range": false,
              "refId": "A"
            }
          ],
          "title": "Backup Storage",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "description": "Age of the latest successful backup produced by the selected schedule.",
          "fieldConfig": {
            "defaults": {
              "decimals": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 24
                  },
                  {
                    "color": "red",
                    "value": 27
                  }
                ]
              },
              "unit": "h"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 4,
            "y": 0
          },
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "editorMode": "code",
              "expr": "(time() - max(velero_backup_last_successful_timestamp{namespace=\"velero\",schedule=\"$schedule\"})) / 3600",
              "instant": true,
              "legendFormat": "Age",
              "range": false,
              "refId": "A"
            }
          ],
          "title": "Latest Successful Backup Age",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "description": "Status reported for the most recent backup from the selected schedule.",
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "options": {
                    "0": {
                      "text": "Failed"
                    },
                    "1": {
                      "text": "Successful"
                    }
                  },
                  "type": "value"
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 8,
            "y": 0
          },
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "editorMode": "code",
              "expr": "max(velero_backup_last_status{namespace=\"velero\",schedule=\"$schedule\"})",
              "instant": true,
              "legendFormat": "Status",
              "range": false,
              "refId": "A"
            }
          ],
          "title": "Latest Backup Status",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "options": {
                    "0": {
                      "text": "Down"
                    },
                    "1": {
                      "text": "Up"
                    }
                  },
                  "type": "value"
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 12,
            "y": 0
          },
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "editorMode": "code",
              "expr": "min(up{namespace=\"velero\",job=\"velero\"})",
              "instant": true,
              "legendFormat": "Velero",
              "range": false,
              "refId": "A"
            }
          ],
          "title": "Velero Server",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 2
                  },
                  {
                    "color": "green",
                    "value": 3
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 16,
            "y": 0
          },
          "id": 5,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(up{namespace=\"velero\",job=\"velero/node-agent\"})",
              "instant": true,
              "legendFormat": "Agents",
              "range": false,
              "refId": "A"
            }
          ],
          "title": "Node Agents Up",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 5,
            "w": 4,
            "x": 20,
            "y": 0
          },
          "id": 6,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "editorMode": "code",
              "expr": "count(ALERTS{component=\"velero\",alertstate=\"firing\"}) or vector(0)",
              "instant": true,
              "legendFormat": "Alerts",
              "range": false,
              "refId": "A"
            }
          ],
          "title": "Firing Velero Alerts",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "bars",
                "fillOpacity": 25,
                "gradientMode": "none",
                "hideFrom": {
                  "legend": false,
                  "tooltip": false,
                  "viz": false
                },
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": {
                  "type": "linear"
                },
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {
                  "group": "A",
                  "mode": "normal"
                },
                "thresholdsStyle": {
                  "mode": "off"
                }
              },
              "decimals": 0
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 5
          },
          "id": 7,
          "options": {
            "legend": {
              "calcs": [
                "sum"
              ],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "hideZeros": false,
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(increase(velero_backup_success_total{namespace=\"velero\",schedule=\"$schedule\"}[$__rate_interval]))",
              "legendFormat": "Successful",
              "range": true,
              "refId": "A"
            },
            {
              "editorMode": "code",
              "expr": "sum(increase(velero_backup_partial_failure_total{namespace=\"velero\",schedule=\"$schedule\"}[$__rate_interval]))",
              "legendFormat": "Partially failed",
              "range": true,
              "refId": "B"
            },
            {
              "editorMode": "code",
              "expr": "sum(increase(velero_backup_failure_total{namespace=\"velero\",schedule=\"$schedule\"}[$__rate_interval]))",
              "legendFormat": "Failed",
              "range": true,
              "refId": "C"
            },
            {
              "editorMode": "code",
              "expr": "sum(increase(velero_backup_warning_total{namespace=\"velero\",schedule=\"$schedule\"}[$__rate_interval]))",
              "legendFormat": "Warnings",
              "range": true,
              "refId": "D"
            }
          ],
          "title": "Backup Results",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "bars",
                "fillOpacity": 20,
                "gradientMode": "none",
                "hideFrom": {
                  "legend": false,
                  "tooltip": false,
                  "viz": false
                },
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": {
                  "type": "linear"
                },
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {
                  "group": "A",
                  "mode": "normal"
                },
                "thresholdsStyle": {
                  "mode": "off"
                }
              },
              "decimals": 0
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 5
          },
          "id": 8,
          "options": {
            "legend": {
              "calcs": [
                "sum"
              ],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "hideZeros": false,
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(increase(velero_csi_snapshot_success_total{namespace=\"velero\",schedule=\"$schedule\"}[$__rate_interval]))",
              "legendFormat": "Successful",
              "range": true,
              "refId": "A"
            },
            {
              "editorMode": "code",
              "expr": "sum(increase(velero_csi_snapshot_failure_total{namespace=\"velero\",schedule=\"$schedule\"}[$__rate_interval]))",
              "legendFormat": "Failed",
              "range": true,
              "refId": "B"
            }
          ],
          "title": "CSI Snapshots",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "none",
                "hideFrom": {
                  "legend": false,
                  "tooltip": false,
                  "viz": false
                },
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {
                  "type": "linear"
                },
                "showPoints": "auto",
                "spanNulls": false,
                "stacking": {
                  "group": "A",
                  "mode": "none"
                },
                "thresholdsStyle": {
                  "mode": "off"
                }
              },
              "decimals": 0
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 13
          },
          "id": 9,
          "options": {
            "legend": {
              "calcs": [
                "sum"
              ],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "hideZeros": false,
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "sum(increase(podVolume_data_upload_success_total{namespace=\"velero\"}[$__rate_interval]))",
              "legendFormat": "Upload success",
              "range": true,
              "refId": "A"
            },
            {
              "editorMode": "code",
              "expr": "sum(increase(podVolume_data_upload_failure_total{namespace=\"velero\"}[$__rate_interval]))",
              "legendFormat": "Upload failure",
              "range": true,
              "refId": "B"
            },
            {
              "editorMode": "code",
              "expr": "sum(increase(podVolume_data_download_success_total{namespace=\"velero\"}[$__rate_interval]))",
              "legendFormat": "Download success",
              "range": true,
              "refId": "C"
            },
            {
              "editorMode": "code",
              "expr": "sum(increase(podVolume_data_download_failure_total{namespace=\"velero\"}[$__rate_interval]))",
              "legendFormat": "Download failure",
              "range": true,
              "refId": "D"
            }
          ],
          "title": "Snapshot Data Movement",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "cellOptions": {
                  "type": "auto"
                },
                "inspect": false
              },
              "mappings": [
                {
                  "options": {
                    "0": {
                      "text": "Down"
                    },
                    "1": {
                      "text": "Up"
                    }
                  },
                  "type": "value"
                }
              ]
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 13
          },
          "id": 10,
          "options": {
            "cellHeight": "sm",
            "footer": {
              "countRows": false,
              "fields": "",
              "reducer": [
                "sum"
              ],
              "show": false
            },
            "showHeader": true,
            "sortBy": []
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "up{namespace=\"velero\",job=\"velero/node-agent\"}",
              "format": "table",
              "instant": true,
              "legendFormat": "{{ "{{node}}" }}",
              "range": false,
              "refId": "A"
            }
          ],
          "title": "Node-Agent Targets",
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "container": true,
                  "endpoint": true,
                  "instance": true,
                  "job": true,
                  "namespace": true,
                  "service": true
                },
                "indexByName": {},
                "renameByName": {
                  "Value": "Status",
                  "node": "Node",
                  "pod": "Pod"
                }
              }
            }
          ],
          "type": "table"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "cellOptions": {
                  "type": "auto"
                },
                "inspect": false
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 7,
            "w": 24,
            "x": 0,
            "y": 21
          },
          "id": 11,
          "options": {
            "cellHeight": "sm",
            "footer": {
              "countRows": false,
              "fields": "",
              "reducer": [
                "sum"
              ],
              "show": false
            },
            "showHeader": true,
            "sortBy": []
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "ALERTS{component=\"velero\",alertstate=\"firing\"}",
              "format": "table",
              "instant": true,
              "legendFormat": "{{ "{{alertname}}" }}",
              "range": false,
              "refId": "A"
            }
          ],
          "title": "Firing Velero Alerts",
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "alertstate": true,
                  "component": true,
                  "prometheus": true,
                  "prometheus_replica": true
                },
                "indexByName": {},
                "renameByName": {
                  "Value": "Firing",
                  "alertname": "Alert",
                  "severity": "Severity"
                }
              }
            }
          ],
          "type": "table"
        }
      ],
      "refresh": {{ .Values.dashboard.refresh | quote }},
      "schemaVersion": 40,
      "tags": [
        "velero",
        "backup",
        "restore",
        "gitops"
      ],
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "label": "Prometheus",
            "multi": false,
            "name": "DS_PROMETHEUS",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "type": "datasource"
          },
          {
            "current": {
              "selected": true,
              "text": "{{ .Values.alerts.scheduleName }}",
              "value": "{{ .Values.alerts.scheduleName }}"
            },
            "definition": "label_values(velero_backup_last_successful_timestamp, schedule)",
            "hide": 0,
            "includeAll": false,
            "label": "Schedule",
            "multi": false,
            "name": "schedule",
            "options": [],
            "query": {
              "query": "label_values(velero_backup_last_successful_timestamp, schedule)",
              "refId": "PrometheusVariableQueryEditor-VariableQuery"
            },
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": {
        "from": "now-7d",
        "to": "now"
      },
      "timepicker": {
        "refresh_intervals": [
          "5s",
          "10s",
          "30s",
          "1m",
          "5m",
          "15m",
          "30m",
          "1h"
        ]
      },
      "timezone": "browser",
      "title": "Velero Backup & Restore",
      "uid": "velero-backup-restore",
      "version": 1,
      "weekStart": "monday"
    }
{{- end }}
