policy:
  timezone: Europe/London

  schedules:
    daily-everything:
      enabled: true

      # Preserve the schedule without allowing backups to run.
      paused: false

      # This is a one-shot Velero control field.
      # Velero resets it to false after consuming it, so false is the normal
      # GitOps steady state.
      skipImmediately: false

      # Standard five-field cron expression.
      # The chart adds CRON_TZ=Europe/London.
      cron: "0 11 * * *"

      # Thirty days.
      retention: "720h0m0s"

      storageLocation: default

      # An empty list means every namespace is included.
      includedNamespaces: []

      # Velero's own operational resources are excluded.
      excludedNamespaces:
        - velero

      includeClusterResources: true

      # Ephemeral or controller-generated resources that have no useful
      # restore value.
      excludedResources:
        - events
        - events.events.k8s.io
        - leases.coordination.k8s.io
        - ciliumendpoints.cilium.io

      snapshotVolumes: true
      snapshotMoveData: true

      csiSnapshotTimeout: "15m"
      itemOperationTimeout: "8h"

      uploader:
        parallelFilesUpload: 4

alerts:
  enabled: true

  # Must match the PrometheusRule selector used by kube-prometheus-stack.
  prometheusRuleLabels:
    release: kube-prometheus-stack

  scheduleName: daily-everything
  backupStorageLocation: default

  # The backup runs every 24 hours. Allow three additional hours before
  # declaring that no recent successful backup exists.
  staleAfterHours: 27

  targetDownFor: "5m"
  storageUnavailableFor: "5m"
  staleFor: "15m"

  # Counter-based failure alerts look for new failures during this window.
  counterWindow: "1h"

dashboard:
  enabled: true
  namespace: monitoring
  refresh: "30s"
