apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: external-gateway
  namespace: platform-gateway
spec:
  gatewayClassName: envoy-gateway
  addresses:
    - type: IPAddress
      value: 10.0.20.17
  listeners:
    - name: https
      hostname: "*.hacwa.co.uk"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: hacwa-co-uk-wildcard-tls
      allowedRoutes:
        namespaces:
          from: All
