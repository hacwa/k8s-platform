apiVersion: batch/v1
kind: Job
metadata:
  name: librenms-admin-bootstrap
  namespace: librenms
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 20
  activeDeadlineSeconds: 1800

  template:
    metadata:
      labels:
        app.kubernetes.io/name: librenms
        app.kubernetes.io/component: admin-bootstrap
    spec:
      restartPolicy: Never

      containers:
        - name: configure-admin
          image: docker.io/librenms/librenms:26.6.1
          imagePullPolicy: IfNotPresent

          command:
            - /bin/sh
            - -ec

          args:
            - |
              cd /opt/librenms

              until gosu librenms php artisan migrate:status >/dev/null 2>&1; do
                sleep 5
              done

              gosu librenms \
                env ADMIN_PASSWORD="$ADMIN_PASSWORD" \
                php artisan tinker --execute='$u=\App\Models\User::firstOrNew(["username"=>"admin","auth_type"=>"mysql"]);$u->realname="Administrator";$u->setPassword(getenv("ADMIN_PASSWORD"));$u->save();$u->syncRoles(["admin"]);echo "Local admin reconciled".PHP_EOL;'

          envFrom:
            - configMapRef:
                name: librenms

          env:
            - name: HOME
              value: /home/librenms

            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: librenms-app
                  key: appkey

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: librenms-mysql-auth
                  key: mysql-user-password

            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: librenms-app
                  key: admin-password
