apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dependency-track-postgresql-data
  namespace: dependency-track
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/sync-options: Prune=false
  labels:
    app.kubernetes.io/name: dependency-track-postgresql
spec:
  accessModes:
    - ReadWriteOnce

  storageClassName: rook-ceph-block

  resources:
    requests:
      storage: 10Gi
