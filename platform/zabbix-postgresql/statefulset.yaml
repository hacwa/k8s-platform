apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zabbix-postgresql
  namespace: zabbix
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: zabbix
    app.kubernetes.io/component: postgresql
spec:
  serviceName: zabbix-postgresql
  replicas: 1
  podManagementPolicy: OrderedReady

  updateStrategy:
    type: RollingUpdate

  selector:
    matchLabels:
      app.kubernetes.io/name: zabbix
      app.kubernetes.io/component: postgresql

  template:
    metadata:
      labels:
        app.kubernetes.io/name: zabbix
        app.kubernetes.io/component: postgresql

    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 120

      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: postgresql
          image: docker.io/library/postgres:17.9-bookworm
          imagePullPolicy: IfNotPresent

          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            allowPrivilegeEscalation: false

            capabilities:
              drop:
                - ALL

          env:
            - name: POSTGRES_USER
              value: postgres

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zabbix-postgresql-auth
                  key: postgres-password

            - name: POSTGRES_DB
              value: postgres

            - name: ZABBIX_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zabbix-postgresql-auth
                  key: zabbix-password

            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

            - name: LANG
              value: en_US.utf8

            - name: LC_ALL
              value: en_US.utf8

            - name: TZ
              value: Europe/London

            - name: PGTZ
              value: Europe/London

            - name: POSTGRES_INITDB_ARGS
              value: >-
                --encoding=UTF8
                --locale-provider=libc
                --locale=en_US.UTF-8

          args:
            - -c
            - max_connections=100
            - -c
            - shared_buffers=128MB
            - -c
            - effective_cache_size=4GB
            - -c
            - work_mem=4MB
            - -c
            - maintenance_work_mem=64MB
            - -c
            - max_wal_size=1GB
            - -c
            - checkpoint_completion_target=0.9
            - -c
            - wal_compression=off
            - -c
            - timezone=Europe/London

          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP

          startupProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - pg_isready -U postgres -d postgres
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 120

          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - pg_isready -U postgres -d postgres
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - pg_isready -U postgres -d postgres
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6

          resources:
            requests:
              cpu: 500m
              memory: 2Gi

            limits:
              cpu: "4"
              memory: 4Gi

          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data

            - name: initdb
              mountPath: /docker-entrypoint-initdb.d/10-create-zabbix-database.sh
              subPath: 10-create-zabbix-database.sh
              readOnly: true

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: zabbix-postgresql-data

        - name: initdb
          configMap:
            name: zabbix-postgresql-initdb
            defaultMode: 0555
