apiVersion: v1
kind: ConfigMap
metadata:
  name: zabbix-postgresql-initdb
  namespace: zabbix
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  labels:
    app.kubernetes.io/name: zabbix
    app.kubernetes.io/component: postgresql
data:
  10-create-zabbix-database.sh: |
    #!/usr/bin/env bash
    set -Eeuo pipefail

    psql \
      --set=ON_ERROR_STOP=1 \
      --username="${POSTGRES_USER}" \
      --dbname=postgres \
      --set=zabbix_password="${ZABBIX_DATABASE_PASSWORD}" <<'SQL'
    SELECT format(
        'CREATE ROLE zabbix LOGIN PASSWORD %L',
        :'zabbix_password'
    )
    WHERE NOT EXISTS (
        SELECT 1
        FROM pg_roles
        WHERE rolname = 'zabbix'
    )
    \gexec

    SELECT format(
        'CREATE DATABASE zabbixdb OWNER zabbix TEMPLATE template0 ENCODING %L LC_COLLATE %L LC_CTYPE %L',
        'UTF8',
        'en_US.UTF-8',
        'en_US.UTF-8'
    )
    WHERE NOT EXISTS (
        SELECT 1
        FROM pg_database
        WHERE datname = 'zabbixdb'
    )
    \gexec
    SQL
