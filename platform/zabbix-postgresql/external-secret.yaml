apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zabbix-postgresql-auth
  namespace: zabbix
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
  labels:
    app.kubernetes.io/name: zabbix
    app.kubernetes.io/component: postgresql
spec:
  refreshPolicy: Periodic
  refreshInterval: 15m

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: zabbix-postgresql-auth
    creationPolicy: Owner
    deletionPolicy: Retain

    template:
      type: Opaque

      metadata:
        labels:
          app.kubernetes.io/name: zabbix
          app.kubernetes.io/component: postgresql

  data:
    - secretKey: postgres-password
      remoteRef:
        key: hacwa_aws_secrets
        property: ZABBIX_POSTGRESQL_SUPERUSER_PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None

    - secretKey: zabbix-password
      remoteRef:
        key: hacwa_aws_secrets
        property: ZABBIX_POSTGRESQL_PASSWORD
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
