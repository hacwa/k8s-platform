apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: synapse-postgresql
  namespace: matrix
  labels:
    app.kubernetes.io/name: matrix
    app.kubernetes.io/component: postgresql
spec:
  serviceName: synapse-postgresql
  replicas: 1
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: matrix
      app.kubernetes.io/component: postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: matrix
        app.kubernetes.io/component: postgresql
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgresql
          image: postgres:16.4-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: POSTGRES_USER
              value: synapse
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: matrix-postgresql-auth
                  key: postgres-password
            - name: POSTGRES_DB
              value: synapse
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: LANG
              value: C.UTF-8
            - name: LC_COLLATE
              value: C
            - name: LC_CTYPE
              value: C
            - name: POSTGRES_INITDB_ARGS
              value: --encoding=UTF8 --locale=C
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - pg_isready -U synapse -d synapse
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - pg_isready -U synapse -d synapse
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - pg_isready -U synapse -d synapse
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: matrix-postgresql-data
