apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: matrix-postgresql-data
  namespace: matrix
  labels:
    app.kubernetes.io/name: matrix
    app.kubernetes.io/component: postgresql
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: rook-ceph-block
  resources:
    requests:
      storage: 20Gi
