apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: aws-secrets-manager-validation
  namespace: external-secrets
  labels:
    app.kubernetes.io/name: aws-secrets-manager-validation
    app.kubernetes.io/part-of: external-secrets
spec:
  refreshPolicy: Periodic
  refreshInterval: 15m

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: aws-secrets-manager-validation
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      metadata:
        labels:
          app.kubernetes.io/name: aws-secrets-manager-validation
          app.kubernetes.io/part-of: external-secrets

  dataFrom:
    - extract:
        key: hacwa_aws_secrets
