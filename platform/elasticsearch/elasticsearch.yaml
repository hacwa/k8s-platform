apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: hacwa
  namespace: elastic-stack
  labels:
    app.kubernetes.io/name: elasticsearch
    app.kubernetes.io/part-of: elastic-stack
  annotations:
    argocd.argoproj.io/sync-options: Prune=false,Delete=false
spec:
  version: 9.4.3
  volumeClaimDeletePolicy: DeleteOnScaledownOnly

  secureSettings:
    - secretName: hacwa-elasticsearch-snapshot-credentials

  http:
    service:
      spec:
        type: ClusterIP

  nodeSets:
    - name: default
      count: 1

      config:
        node.roles:
          - master
          - data
          - ingest
          - remote_cluster_client
          - transform
        s3.client.default.endpoint: 10.0.6.5:9000
        s3.client.default.protocol: http
        cluster.routing.allocation.disk.watermark.low: 80%
        cluster.routing.allocation.disk.watermark.high: 85%
        cluster.routing.allocation.disk.watermark.flood_stage: 90%

      podTemplate:
        metadata:
          labels:
            app.kubernetes.io/name: elasticsearch
            app.kubernetes.io/part-of: elastic-stack
        spec:
          terminationGracePeriodSeconds: 180

          nodeSelector:
            kubernetes.io/hostname: k8s-worker-03
            hacwa.internal/elasticsearch-local: "true"

          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch

          containers:
            - name: elasticsearch
              env:
                - name: ES_JAVA_OPTS
                  value: -Xms3g -Xmx3g
              resources:
                requests:
                  cpu: "1"
                  memory: 6Gi
                limits:
                  cpu: "4"
                  memory: 6Gi

      volumeClaimTemplates:
        - metadata:
            name: elasticsearch-data
            labels:
              app.kubernetes.io/name: elasticsearch-data
              app.kubernetes.io/part-of: elastic-stack
              hacwa.internal/backup-method: elasticsearch-snapshot
          spec:
            accessModes:
              - ReadWriteOnce
            volumeMode: Filesystem
            storageClassName: elasticsearch-local
            volumeName: hacwa-elasticsearch-local-pv
            resources:
              requests:
                storage: 200Gi
