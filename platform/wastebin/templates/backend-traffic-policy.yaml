{{- if and .Values.route.enabled .Values.rateLimit.enabled }}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: wastebin
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: wastebin

  rateLimit:
    local:
      rules:
        - clientSelectors:
            - methods:
                - value: POST

          limit:
            requests: {{ .Values.rateLimit.postRequestsPerMinute }}
            unit: Minute
{{- end }}
