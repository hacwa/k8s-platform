replicaCount: 1

image:
  repository: docker.io/quxfoo/wastebin
  tag: "3.7.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8088

persistence:
  enabled: true
  storageClassName: rook-ceph-block
  accessMode: ReadWriteOnce
  size: 1Gi

wastebin:
  title: HACWA Paste
  baseUrl: https://paste.hacwa.co.uk
  databasePath: /data/state.db
  maxBodySize: "1048576"
  httpTimeout: "10"
  cacheSize: "128"
  logLevel: info

route:
  enabled: true
  hostname: paste.hacwa.co.uk

  gateway:
    name: external-gateway
    namespace: platform-gateway
    sectionName: https

rateLimit:
  enabled: true

  # Wastebin has no authentication or native abuse protection.
  # Limit creation requests while leaving normal paste reads unrestricted.
  postRequestsPerMinute: 60

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 500m
    memory: 256Mi
