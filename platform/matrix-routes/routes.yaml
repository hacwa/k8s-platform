apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: matrix-synapse
  namespace: matrix
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: external-gateway
      namespace: platform-gateway
      sectionName: https
  hostnames:
    - synapse.hacwa.co.uk
  rules:
    - matches:
        - path:
            type: Exact
            value: /.well-known/matrix/server
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.envoyproxy.io
            kind: HTTPRouteFilter
            name: matrix-well-known-server
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Access-Control-Allow-Origin
                value: "*"

    - matches:
        - method: OPTIONS
          path:
            type: Exact
            value: /.well-known/matrix/client
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.envoyproxy.io
            kind: HTTPRouteFilter
            name: matrix-well-known-options
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Access-Control-Allow-Origin
                value: "*"
              - name: Access-Control-Allow-Methods
                value: GET, POST, PUT, DELETE, OPTIONS
              - name: Access-Control-Allow-Headers
                value: X-Requested-With, Content-Type, Authorization, Date

    - matches:
        - path:
            type: Exact
            value: /.well-known/matrix/client
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.envoyproxy.io
            kind: HTTPRouteFilter
            name: matrix-well-known-client
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Access-Control-Allow-Origin
                value: "*"
              - name: Access-Control-Allow-Methods
                value: GET, POST, PUT, DELETE, OPTIONS
              - name: Access-Control-Allow-Headers
                value: X-Requested-With, Content-Type, Authorization, Date

    - matches:
        - path:
            type: Exact
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.envoyproxy.io
            kind: HTTPRouteFilter
            name: matrix-root

    - matches:
        - path:
            type: RegularExpression
            value: ^/_matrix/client/[^/]+/(login|logout|refresh)$
      backendRefs:
        - group: ""
          kind: Service
          name: mas
          port: 8080
          weight: 1

    - matches:
        - path:
            type: PathPrefix
            value: /_matrix
        - path:
            type: PathPrefix
            value: /_synapse
      backendRefs:
        - group: ""
          kind: Service
          name: synapse
          port: 8008
          weight: 1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: matrix-rtc
  namespace: matrix
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: external-gateway
      namespace: platform-gateway
      sectionName: https
  hostnames:
    - matrix-rtc.hacwa.co.uk
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /livekit/jwt
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - group: ""
          kind: Service
          name: matrix-rtc-auth
          port: 8080
          weight: 1

    - matches:
        - path:
            type: PathPrefix
            value: /livekit/sfu
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      timeouts:
        request: 0s
      backendRefs:
        - group: ""
          kind: Service
          name: livekit
          port: 7880
          weight: 1
