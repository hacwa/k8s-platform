apiVersion: apps/v1
kind: Deployment
metadata:
  name: firefox-oauth2-proxy
  namespace: firefox
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: firefox
    app.kubernetes.io/component: oauth2-proxy
spec:
  replicas: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: firefox
      app.kubernetes.io/component: oauth2-proxy

  template:
    metadata:
      labels:
        app.kubernetes.io/name: firefox
        app.kubernetes.io/component: oauth2-proxy

    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30

      securityContext:
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.3
          imagePullPolicy: IfNotPresent

          args:
            - --provider=keycloak
            - --provider-display-name=Keycloak
            - --client-id=firefox-oauth2

            - --login-url=https://keycloak.hacwa.co.uk/realms/master/protocol/openid-connect/auth
            - --redeem-url=https://keycloak.hacwa.co.uk/realms/master/protocol/openid-connect/token
            - --profile-url=https://keycloak.hacwa.co.uk/realms/master/protocol/openid-connect/userinfo
            - --validate-url=https://keycloak.hacwa.co.uk/realms/master/protocol/openid-connect/userinfo

            - --redirect-url=https://firefox.hacwa.co.uk/oauth2/callback
            - --upstream=http://firefox:5800
            - --upstream-timeout=5m

            - --http-address=0.0.0.0:4180
            - --metrics-address=0.0.0.0:44180

            - --scope=openid email profile
            - --email-domain=*
            - --code-challenge-method=S256

            - --reverse-proxy=true
            - --proxy-websockets=true
            - --skip-provider-button=true

            - --cookie-name=__Host-firefox-oauth2
            - --cookie-secure=true
            - --cookie-httponly=true
            - --cookie-samesite=lax
            - --cookie-expire=24h
            - --cookie-refresh=1h

            - --silence-ping-logging=true
            - --show-debug-on-error=false

          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: firefox-oauth2
                  key: client-secret

            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: firefox-oauth2
                  key: cookie-secret

            - name: TMPDIR
              value: /tmp

          ports:
            - name: http
              containerPort: 4180
              protocol: TCP

            - name: metrics
              containerPort: 44180
              protocol: TCP

          startupProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30

          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 2000
            runAsGroup: 2000
            capabilities:
              drop:
                - ALL

          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi

          volumeMounts:
            - name: temporary
              mountPath: /tmp

      volumes:
        - name: temporary
          emptyDir:
            sizeLimit: 64Mi
