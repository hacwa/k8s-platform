apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: firefox-config
  namespace: firefox
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app.kubernetes.io/name: firefox
spec:
  accessModes:
    - ReadWriteOnce

  storageClassName: rook-ceph-block

  resources:
    requests:
      storage: 10Gi
