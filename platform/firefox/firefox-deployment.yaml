apiVersion: apps/v1
kind: Deployment
metadata:
  name: firefox
  namespace: firefox
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: firefox
    app.kubernetes.io/component: browser
spec:
  replicas: 1

  # The Firefox profile is held on a single RWO Ceph volume.
  strategy:
    type: Recreate

  selector:
    matchLabels:
      app.kubernetes.io/name: firefox
      app.kubernetes.io/component: browser

  template:
    metadata:
      labels:
        app.kubernetes.io/name: firefox
        app.kubernetes.io/component: browser

    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30

      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: firefox
          image: docker.io/jlesage/firefox:v26.07.2
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 5800
              protocol: TCP

          env:
            - name: USER_ID
              value: "1000"

            - name: GROUP_ID
              value: "1000"

            - name: TZ
              value: Europe/London

            - name: WEB_LISTENING_PORT
              value: "5800"

            - name: VNC_LISTENING_PORT
              value: "-1"

            - name: WEB_NOTIFICATION
              value: "1"

            - name: WEB_TERMINAL
              value: "0"

          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 60

          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi

          volumeMounts:
            - name: config
              mountPath: /config

            - name: shared-memory
              mountPath: /dev/shm

      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: firefox-config

        - name: shared-memory
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
