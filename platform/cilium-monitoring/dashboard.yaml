apiVersion: v1
kind: ConfigMap
metadata:
  name: cilium-grafana-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  cilium.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "id": 1,
          "title": "Cilium agents ready",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "kube_daemonset_status_number_ready{namespace=\"kube-system\",daemonset=\"cilium\"}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Cilium Envoy ready",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "kube_daemonset_status_number_ready{namespace=\"kube-system\",daemonset=\"cilium-envoy\"}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Operator replicas ready",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 12,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_ready{namespace=\"kube-system\",deployment=\"cilium-operator\"}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Metrics targets up",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 18,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "sum(up{monitor_component=~\"cilium-operator|cilium-envoy\"})",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "Cilium component readiness",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 5
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "table",
              "placement": "right",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "kube_daemonset_status_number_ready{namespace=\"kube-system\",daemonset=\"cilium\"}",
              "legendFormat": "Cilium agents",
              "refId": "A"
            },
            {
              "expr": "kube_daemonset_status_number_ready{namespace=\"kube-system\",daemonset=\"cilium-envoy\"}",
              "legendFormat": "Cilium Envoy",
              "refId": "B"
            },
            {
              "expr": "kube_deployment_status_replicas_ready{namespace=\"kube-system\",deployment=\"cilium-operator\"}",
              "legendFormat": "Cilium operator",
              "refId": "C"
            }
          ]
        },
        {
          "id": 6,
          "title": "Prometheus scrape status",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 14
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "table",
              "placement": "right",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "up{monitor_component=~\"cilium-operator|cilium-envoy\"}",
              "legendFormat": "{{monitor_component}} - {{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "title": "Cilium component restarts",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 23
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "table",
              "placement": "right",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "increase(kube_pod_container_status_restarts_total{namespace=\"kube-system\",container=~\"cilium-agent|cilium-operator|cilium-envoy\"}[1h])",
              "legendFormat": "{{container}} - {{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "title": "Cilium Envoy live state",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 32
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "table",
              "placement": "right",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "envoy_server_live{monitor_component=\"cilium-envoy\"}",
              "legendFormat": "{{node}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 9,
          "title": "Cilium Envoy allocated memory",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 41
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "table",
              "placement": "right",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "envoy_server_memory_allocated{monitor_component=\"cilium-envoy\"}",
              "legendFormat": "{{node}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 10,
          "title": "Cilium Envoy upstream connection failures",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 50
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "table",
              "placement": "right",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "sum by (node, envoy_cluster_name) (rate(envoy_cluster_upstream_cx_connect_fail{monitor_component=\"cilium-envoy\"}[5m]))",
              "legendFormat": "{{node}} - {{envoy_cluster_name}}",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 40,
      "tags": [
        "cilium",
        "envoy",
        "networking",
        "gitops"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timezone": "browser",
      "title": "Cilium",
      "uid": "cilium-monitoring",
      "version": 1
    }
