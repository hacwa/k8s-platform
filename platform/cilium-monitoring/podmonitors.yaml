apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: cilium-operator
  namespace: kube-system
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      io.cilium/app: operator
      name: cilium-operator
  podMetricsEndpoints:
    - port: prometheus
      path: /metrics
      interval: 30s
      relabelings:
        - action: replace
          replacement: cilium-operator
          targetLabel: monitor_component
        - action: replace
          sourceLabels:
            - __meta_kubernetes_pod_node_name
          targetLabel: node
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: cilium-envoy
  namespace: kube-system
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      k8s-app: cilium-envoy
  podMetricsEndpoints:
    - port: envoy-metrics
      path: /metrics
      interval: 30s
      relabelings:
        - action: replace
          replacement: cilium-envoy
          targetLabel: monitor_component
        - action: replace
          sourceLabels:
            - __meta_kubernetes_pod_node_name
          targetLabel: node
