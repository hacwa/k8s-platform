apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: hacwa-elasticsearch-tls
  namespace: elastic-stack
  labels:
    app.kubernetes.io/name: elasticsearch
    app.kubernetes.io/part-of: elastic-stack
spec:
  endpoints:
    - fqdn:
        hostname: hacwa-es-http.elastic-stack.svc.cluster.local
        port: 9200
  tls:
    insecureSkipVerify: true
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kibana-external
  namespace: elastic-stack
  labels:
    app.kubernetes.io/name: kibana
    app.kubernetes.io/part-of: elastic-stack
spec:
  parentRefs:
    - name: external-gateway
      namespace: platform-gateway
      sectionName: https
  hostnames:
    - elk.hacwa.co.uk
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hacwa-kb-http
          port: 5601
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fleet-server-external
  namespace: elastic-stack
  labels:
    app.kubernetes.io/name: fleet-server
    app.kubernetes.io/part-of: elastic-stack
spec:
  parentRefs:
    - name: external-gateway
      namespace: platform-gateway
      sectionName: https
  hostnames:
    - fleet.hacwa.co.uk
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: fleet-server-agent-http
          port: 8220
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: elasticsearch-external
  namespace: elastic-stack
  labels:
    app.kubernetes.io/name: elasticsearch
    app.kubernetes.io/part-of: elastic-stack
spec:
  parentRefs:
    - name: external-gateway
      namespace: platform-gateway
      sectionName: https
  hostnames:
    - elasticsearch.hacwa.co.uk
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: hacwa-elasticsearch-tls
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: apm-server-external
  namespace: elastic-stack
  labels:
    app.kubernetes.io/name: apm-server
    app.kubernetes.io/part-of: elastic-stack
spec:
  parentRefs:
    - name: external-gateway
      namespace: platform-gateway
      sectionName: https
  hostnames:
    - apm.hacwa.co.uk
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hacwa-apm-http
          port: 8200
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: UDPRoute
metadata:
  name: logstash-syslog-external
  namespace: elastic-stack
  labels:
    app.kubernetes.io/name: logstash-syslog
    app.kubernetes.io/part-of: elastic-stack
spec:
  parentRefs:
    - name: external-gateway
      namespace: platform-gateway
      sectionName: syslog-udp
  rules:
    - backendRefs:
        - name: hacwa-ls-syslog
          port: 5514
