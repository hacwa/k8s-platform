apiVersion: v1
kind: ConfigMap
metadata:
  name: hacwa-elasticsearch-single-node-policy
  namespace: elastic-stack
  labels:
    app.kubernetes.io/name: elasticsearch-single-node-policy
    app.kubernetes.io/part-of: elastic-stack
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  reconcile.sh: |
    #!/bin/sh

    set -eu

    CA_FILE="/usr/share/elasticsearch-ca/tls.crt"
    HEALTH_BEFORE="/tmp/cluster-health-before.json"
    HEALTH_AFTER="/tmp/cluster-health-after.json"
    SETTINGS_RESULT="/tmp/index-settings-result.json"

    es_curl() {
      curl \
        --silent \
        --show-error \
        --fail-with-body \
        --cacert "${CA_FILE}" \
        --user "elastic:${ELASTIC_PASSWORD}" \
        "$@"
    }

    echo "===== WAIT FOR ELASTICSEARCH ====="

    attempt=0

    until es_curl \
      "${ELASTICSEARCH_URL}/_cluster/health?wait_for_status=yellow&timeout=10s" \
      > "${HEALTH_BEFORE}"; do
      attempt=$((attempt + 1))

      if [ "${attempt}" -ge 90 ]; then
        echo "ERROR: Elasticsearch did not become available." >&2
        exit 1
      fi

      sleep 10
    done

    cat "${HEALTH_BEFORE}"
    echo

    echo "===== SET ALL INDICES TO ZERO REPLICAS ====="

    es_curl \
      --request PUT \
      --header 'Content-Type: application/json' \
      --data-binary '{
        "index": {
          "number_of_replicas": 0
        }
      }' \
      "${ELASTICSEARCH_URL}/_settings?expand_wildcards=all&allow_no_indices=true&ignore_unavailable=true" \
      > "${SETTINGS_RESULT}"

    cat "${SETTINGS_RESULT}"
    echo

    if ! tr -d '[:space:]' < "${SETTINGS_RESULT}" |
         grep -q '"acknowledged":true'; then
      echo "ERROR: Elasticsearch did not acknowledge the index settings update." >&2
      exit 1
    fi

    echo "===== WAIT FOR GREEN CLUSTER ====="

    es_curl \
      "${ELASTICSEARCH_URL}/_cluster/health?wait_for_status=green&timeout=120s" \
      > "${HEALTH_AFTER}"

    cat "${HEALTH_AFTER}"
    echo

    HEALTH_COMPACT="$(
      tr -d '[:space:]' < "${HEALTH_AFTER}"
    )"

    if printf '%s\n' "${HEALTH_COMPACT}" |
       grep -q '"timed_out":true'; then
      echo "ERROR: Elasticsearch health request timed out." >&2
      exit 1
    fi

    if ! printf '%s\n' "${HEALTH_COMPACT}" |
         grep -q '"status":"green"'; then
      echo "ERROR: Elasticsearch did not become green." >&2
      exit 1
    fi

    if ! printf '%s\n' "${HEALTH_COMPACT}" |
         grep -q '"unassigned_shards":0'; then
      echo "ERROR: Elasticsearch still has unassigned shards." >&2
      exit 1
    fi

    echo "ELASTICSEARCH_SINGLE_NODE_POLICY_COMPLETE status=green unassigned_shards=0"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: hacwa-elasticsearch-single-node-policy
  namespace: elastic-stack
  labels:
    app.kubernetes.io/name: elasticsearch-single-node-policy
    app.kubernetes.io/part-of: elastic-stack
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 1800
  ttlSecondsAfterFinished: 600

  template:
    metadata:
      labels:
        app.kubernetes.io/name: elasticsearch-single-node-policy
        app.kubernetes.io/part-of: elastic-stack

    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: reconcile
          image: docker.io/curlimages/curl:8.12.1
          imagePullPolicy: IfNotPresent

          command:
            - /bin/sh
            - /policy/reconcile.sh

          envFrom:
            - configMapRef:
                name: hacwa-elasticsearch-bootstrap

          env:
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hacwa-es-elastic-user
                  key: elastic

          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true

          volumeMounts:
            - name: policy
              mountPath: /policy
              readOnly: true

            - name: elasticsearch-ca
              mountPath: /usr/share/elasticsearch-ca
              readOnly: true

            - name: tmp
              mountPath: /tmp

      volumes:
        - name: policy
          configMap:
            name: hacwa-elasticsearch-single-node-policy
            defaultMode: 0555

        - name: elasticsearch-ca
          secret:
            secretName: hacwa-es-http-certs-public

        - name: tmp
          emptyDir: {}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: hacwa-elasticsearch-single-node-policy
  namespace: elastic-stack
  labels:
    app.kubernetes.io/name: elasticsearch-single-node-policy
    app.kubernetes.io/part-of: elastic-stack
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 120

  jobTemplate:
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 300
      ttlSecondsAfterFinished: 600

      template:
        metadata:
          labels:
            app.kubernetes.io/name: elasticsearch-single-node-policy
