apiVersion: batch/v1
kind: Job
metadata:
  name: hacwa-elasticsearch-repository-and-slm
  namespace: elastic-stack
  labels:
    app.kubernetes.io/name: elasticsearch-snapshot-policy
    app.kubernetes.io/part-of: elastic-stack
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 1800
  ttlSecondsAfterFinished: 600

  template:
    metadata:
      labels:
        app.kubernetes.io/name: elasticsearch-snapshot-policy
        app.kubernetes.io/part-of: elastic-stack

    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: configure
          image: docker.io/curlimages/curl:8.12.1
          imagePullPolicy: IfNotPresent

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true

          envFrom:
            - configMapRef:
                name: hacwa-elasticsearch-bootstrap

          env:
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hacwa-es-elastic-user
                  key: elastic

          volumeMounts:
            - name: elasticsearch-ca
              mountPath: /usr/share/elasticsearch-ca
              readOnly: true

            - name: tmp
              mountPath: /tmp

          command:
            - /bin/sh
            - -ec

          args:
            - |
              set -eu

              CA_FILE="/usr/share/elasticsearch-ca/tls.crt"

              es_curl() {
                curl \
                  --silent \
                  --show-error \
                  --fail-with-body \
                  --cacert "${CA_FILE}" \
                  --user "elastic:${ELASTIC_PASSWORD}" \
                  "$@"
              }

              echo "===== WAIT FOR ELASTICSEARCH ====="

              attempt=0

              until es_curl \
                "${ELASTICSEARCH_URL}/_cluster/health?wait_for_status=yellow&timeout=10s" \
                > /tmp/cluster-health.json; do
                attempt=$((attempt + 1))

                if [ "${attempt}" -ge 90 ]; then
                  echo "ERROR: Elasticsearch did not become available." >&2
                  exit 1
                fi

                sleep 10
              done

              cat /tmp/cluster-health.json
              echo

              echo "===== REGISTER MINIO SNAPSHOT REPOSITORY ====="

              es_curl \
                --request PUT \
                --header 'Content-Type: application/json' \
                --data-binary @- \
                "${ELASTICSEARCH_URL}/_snapshot/${ELASTICSEARCH_REPOSITORY}" \
                <<JSON
              {
                "type": "s3",
                "settings": {
                  "bucket": "${ELASTICSEARCH_SNAPSHOT_BUCKET}",
                  "base_path": "${ELASTICSEARCH_SNAPSHOT_BASE_PATH}",
                  "client": "default",
                  "path_style_access": true,
                  "compress": true
                }
              }
              JSON

              echo
              echo "===== VERIFY MINIO SNAPSHOT REPOSITORY ====="

              es_curl \
                --request POST \
                "${ELASTICSEARCH_URL}/_snapshot/${ELASTICSEARCH_REPOSITORY}/_verify" \
                > /tmp/repository-verification.json

              cat /tmp/repository-verification.json
              echo

              if ! grep -q '"nodes"' /tmp/repository-verification.json; then
                echo "ERROR: Repository verification returned no nodes." >&2
                exit 1
              fi

              echo "===== CONFIGURE SNAPSHOT LIFECYCLE POLICY ====="

              es_curl \
                --request PUT \
                --header 'Content-Type: application/json' \
                --data-binary @- \
                "${ELASTICSEARCH_URL}/_slm/policy/${ELASTICSEARCH_SLM_POLICY}" \
                <<JSON
              {
                "schedule": "${ELASTICSEARCH_SLM_SCHEDULE}",
                "name": "<hacwa-daily-{now/d}>",
                "repository": "${ELASTICSEARCH_REPOSITORY}",
                "config": {
                  "indices": "*",
                  "ignore_unavailable": true,
                  "include_global_state": true,
                  "feature_states": ["*"]
                },
                "retention": {
                  "expire_after": "30d",
                  "min_count": 7,
                  "max_count": 60
                }
              }
              JSON

              echo
              echo "===== VERIFY REPOSITORY ====="

              es_curl \
                "${ELASTICSEARCH_URL}/_snapshot/${ELASTICSEARCH_REPOSITORY}?pretty"

              echo
              echo "===== VERIFY SLM POLICY ====="

              es_curl \
                "${ELASTICSEARCH_URL}/_slm/policy/${ELASTICSEARCH_SLM_POLICY}?pretty"

              echo
              echo "ELASTICSEARCH_REPOSITORY_AND_SLM_CONFIGURED"

      volumes:
        - name: elasticsearch-ca
          secret:
            secretName: hacwa-es-http-certs-public

        - name: tmp
          emptyDir: {}
