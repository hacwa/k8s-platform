apiVersion: apps/v1
kind: Deployment
metadata:
  name: coturn
  namespace: matrix
  labels:
    app.kubernetes.io/name: coturn
    app.kubernetes.io/part-of: matrix
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: coturn
      app.kubernetes.io/part-of: matrix
  template:
    metadata:
      labels:
        app.kubernetes.io/name: coturn
        app.kubernetes.io/part-of: matrix
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        - name: render-config
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              python /templates/render-coturn.py \
                /templates/turnserver.conf.template \
                /runtime/turnserver.conf \
                /secrets/static-auth-secret \
                "${POD_IP}"

              chmod 0440 /runtime/turnserver.conf
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: runtime
              mountPath: /runtime

            - name: templates
              mountPath: /templates
              readOnly: true

            - name: secrets
              mountPath: /secrets
              readOnly: true

      containers:
        - name: coturn
          image: coturn/coturn:4.14.0-r0
          imagePullPolicy: IfNotPresent
          args:
            - -c
            - /etc/coturn/turnserver.conf
          ports:
            - name: turn-tcp
              containerPort: 3478
              protocol: TCP

            - name: turn-udp
              containerPort: 3478
              protocol: UDP

            - name: turns-tcp
              containerPort: 5349
              protocol: TCP

            - name: turns-udp
              containerPort: 5349
              protocol: UDP
          startupProbe:
            tcpSocket:
              port: turn-tcp
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: turn-tcp
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: turn-tcp
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: runtime
              mountPath: /etc/coturn/turnserver.conf
              subPath: turnserver.conf
              readOnly: true

            - name: tls
              mountPath: /tls
              readOnly: true

            - name: state
              mountPath: /var/lib/coturn

            - name: tmp
              mountPath: /tmp

      volumes:
        - name: runtime
          emptyDir: {}

        - name: templates
          configMap:
            name: matrix-coturn-config

        - name: secrets
          secret:
            secretName: matrix-coturn-secrets
            defaultMode: 0440

        - name: tls
          secret:
            secretName: matrix-turn-tls
            defaultMode: 0440

        - name: state
          emptyDir: {}

        - name: tmp
          emptyDir: {}
