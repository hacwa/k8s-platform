apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: zabbix
  namespace: zabbix
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: zabbix
    app.kubernetes.io/component: web
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: internal-gateway
      namespace: platform-gateway
      sectionName: https-internal-wildcard

  hostnames:
    - zabbix.hacwa.internal

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

      backendRefs:
        - group: ""
          kind: Service
          name: zabbix-web
          port: 8080
          weight: 1
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: zabbix-server
  namespace: zabbix
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: zabbix
    app.kubernetes.io/component: server
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: internal-gateway
      namespace: platform-gateway
      sectionName: zabbix-server

  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: zabbix-server
          port: 10051
          weight: 1
