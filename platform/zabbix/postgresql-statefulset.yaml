apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zabbix-postgresql
  namespace: zabbix
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: zabbix-postgresql
spec:
  serviceName: zabbix-postgresql
  replicas: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: zabbix-postgresql

  template:
    metadata:
      labels:
        app.kubernetes.io/name: zabbix-postgresql

    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 120

      securityContext:
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: postgresql
          image: docker.io/library/postgres:17.9-bookworm
          imagePullPolicy: IfNotPresent

          env:
            - name: POSTGRES_DB
              value: zabbixdb

            - name: POSTGRES_USER
              value: zabbix

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zabbix-postgresql-auth
                  key: postgres-password

            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

            - name: LANG
              value: en_US.UTF-8

            - name: POSTGRES_INITDB_ARGS
              value: >-
                --encoding=UTF8
                --locale-provider=libc
                --lc-collate=en_US.UTF-8
                --lc-ctype=en_US.UTF-8

          args:
            - -c
            - shared_buffers=1GB
            - -c
            - effective_cache_size=3GB
            - -c
            - maintenance_work_mem=256MB
            - -c
            - work_mem=16MB
            - -c
            - max_wal_size=2GB
            - -c
            - checkpoint_completion_target=0.9
            - -c
            - wal_compression=on

          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP

          startupProbe:
            exec:
              command:
                - sh
                - -ec
                - pg_isready -U zabbix -d zabbixdb
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 120

          readinessProbe:
            exec:
              command:
                - sh
                - -ec
                - pg_isready -U zabbix -d zabbixdb
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            exec:
              command:
                - sh
                - -ec
                - pg_isready -U zabbix -d zabbixdb
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6

          resources:
            requests:
              cpu: 500m
              memory: 2Gi

            limits:
              cpu: "4"
              memory: 4Gi

          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: zabbix-postgresql-data
