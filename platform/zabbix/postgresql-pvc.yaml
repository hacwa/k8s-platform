apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zabbix-postgresql-data
  namespace: zabbix
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/sync-options: Prune=false
  labels:
    app.kubernetes.io/name: zabbix-postgresql
spec:
  accessModes:
    - ReadWriteOnce

  storageClassName: rook-ceph-block

  resources:
    requests:
      storage: 30Gi
