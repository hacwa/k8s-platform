apiVersion: v1
kind: Service
metadata:
  name: zabbix-server
  namespace: zabbix
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: zabbix-server
spec:
  selector:
    app.kubernetes.io/name: zabbix-server

  ports:
    - name: zabbix-server
      port: 10051
      targetPort: zabbix-server
      protocol: TCP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-server
  namespace: zabbix
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: zabbix-server
spec:
  replicas: 0

  strategy:
    type: Recreate

  selector:
    matchLabels:
      app.kubernetes.io/name: zabbix-server

  template:
    metadata:
      labels:
        app.kubernetes.io/name: zabbix-server

    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 120

      securityContext:
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: zabbix-server
          image: docker.io/zabbix/zabbix-server-pgsql:7.4.7-ubuntu
          imagePullPolicy: IfNotPresent

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_RAW

          env:
            - name: DB_SERVER_HOST
              value: zabbix-postgresql

            - name: DB_SERVER_PORT
              value: "5432"

            - name: POSTGRES_DB
              value: zabbixdb

            - name: POSTGRES_USER
              value: zabbix

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zabbix-postgresql-auth
                  key: postgres-password

            - name: ZBX_TIMEOUT
              value: "4"

          ports:
            - name: zabbix-server
              containerPort: 10051
              protocol: TCP

          startupProbe:
            tcpSocket:
              port: zabbix-server
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 120

          readinessProbe:
            tcpSocket:
              port: zabbix-server
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6

          livenessProbe:
            tcpSocket:
              port: zabbix-server
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 6

          resources:
            requests:
              cpu: 500m
              memory: 1Gi

            limits:
              cpu: "4"
              memory: 4Gi

        - name: zabbix-agent2
          image: docker.io/zabbix/zabbix-agent2:7.4.7-ubuntu
          imagePullPolicy: IfNotPresent

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          env:
            - name: ZBX_HOSTNAME
              value: Zabbix server

            - name: ZBX_SERVER_HOST
              value: 127.0.0.1

          ports:
            - name: zabbix-agent
              containerPort: 10050
              protocol: TCP

          readinessProbe:
            tcpSocket:
              port: zabbix-agent
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6

          livenessProbe:
            tcpSocket:
              port: zabbix-agent
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 6

          resources:
            requests:
              cpu: 50m
              memory: 128Mi

            limits:
              cpu: 500m
              memory: 512Mi
