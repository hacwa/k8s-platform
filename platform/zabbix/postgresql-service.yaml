apiVersion: v1
kind: Service
metadata:
  name: zabbix-postgresql
  namespace: zabbix
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: zabbix-postgresql
spec:
  clusterIP: None

  selector:
    app.kubernetes.io/name: zabbix-postgresql

  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
      protocol: TCP
