apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: plex-external
  namespace: external-services
spec:
  parentRefs:
    - name: external-gateway
      namespace: platform-gateway
      sectionName: https
  hostnames:
    - plex.hacwa.co.uk
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      timeouts:
        request: 0s
      backendRefs:
        - name: plex-external
          port: 32400
---
