apiVersion: v1
kind: ConfigMap
metadata:
  name: descheduler-grafana-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  descheduler.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "id": 1,
          "title": "Time since successful run",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "time() - kube_cronjob_status_last_successful_time{namespace=\"kube-system\",cronjob=\"descheduler\"}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Time until next run",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "clamp_min(kube_cronjob_next_schedule_time{namespace=\"kube-system\",cronjob=\"descheduler\"} - time(), 0)",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Active jobs",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 12,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "kube_cronjob_status_active{namespace=\"kube-system\",cronjob=\"descheduler\"}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Evictions in 24 hours",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 5,
            "w": 6,
            "x": 18,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "expr": "sum(increase(pods_evicted_total[24h])) or vector(0)",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "Running pods on regular workers",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 5
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "table",
              "placement": "right",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "sum by (node) (kube_pod_info{node=~\"k8s-worker-02|k8s-worker-03\"} * on (namespace, pod) group_left() (kube_pod_status_phase{phase=\"Running\"} == 1))",
              "legendFormat": "{{node}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "title": "Requested CPU percentage",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 14
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "table",
              "placement": "right",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "100 * sum by (node) (kube_pod_container_resource_requests{resource=\"cpu\",unit=\"core\",node=~\"k8s-worker-02|k8s-worker-03\"}) / sum by (node) (kube_node_status_allocatable{resource=\"cpu\",unit=\"core\",node=~\"k8s-worker-02|k8s-worker-03\"})",
              "legendFormat": "{{node}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "title": "Requested memory percentage",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 23
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "table",
              "placement": "right",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "100 * sum by (node) (kube_pod_container_resource_requests{resource=\"memory\",unit=\"byte\",node=~\"k8s-worker-02|k8s-worker-03\"}) / sum by (node) (kube_node_status_allocatable{resource=\"memory\",unit=\"byte\",node=~\"k8s-worker-02|k8s-worker-03\"})",
              "legendFormat": "{{node}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "title": "Completed job duration",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 32
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "table",
              "placement": "right",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "kube_job_status_completion_time{namespace=\"kube-system\",job_name=~\"descheduler-[0-9]+\"} - kube_job_status_start_time{namespace=\"kube-system\",job_name=~\"descheduler-[0-9]+\"}",
              "legendFormat": "{{job_name}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 9,
          "title": "Evictions by strategy",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 41
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "table",
              "placement": "right",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "sum by (strategy) (increase(pods_evicted_total[24h]))",
              "legendFormat": "{{strategy}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 10,
          "title": "Retained failed jobs",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 50
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "table",
              "placement": "right",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "expr": "kube_job_status_failed{namespace=\"kube-system\",job_name=~\"descheduler-[0-9]+\"}",
              "legendFormat": "{{job_name}}",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 40,
      "tags": [
        "descheduler",
        "kubernetes",
        "scheduling"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "timezone": "browser",
      "title": "Kubernetes Descheduler",
      "uid": "kubernetes-descheduler",
      "version": 1
    }
