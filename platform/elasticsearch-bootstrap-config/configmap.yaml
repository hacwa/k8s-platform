apiVersion: v1
kind: ConfigMap
metadata:
  name: hacwa-elasticsearch-bootstrap
  namespace: elastic-stack
  labels:
    app.kubernetes.io/name: elasticsearch-bootstrap
    app.kubernetes.io/part-of: elastic-stack
data:
  ELASTICSEARCH_URL: https://hacwa-es-http.elastic-stack.svc:9200
  ELASTICSEARCH_REPOSITORY: hacwa-minio
  ELASTICSEARCH_SNAPSHOT_BUCKET: elasticsearch-snapshots
  ELASTICSEARCH_SNAPSHOT_BASE_PATH: hacwa
  ELASTICSEARCH_SLM_POLICY: hacwa-daily
  ELASTICSEARCH_SLM_SCHEDULE: 0 30 1 * * ?
