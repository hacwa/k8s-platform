apiVersion: v1
kind: ServiceAccount
metadata:
  name: elastic-agent
  namespace: elastic-stack
  labels:
    app.kubernetes.io/name: elastic-agent
    app.kubernetes.io/part-of: elastic-stack
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: elastic-stack-elastic-agent
  labels:
    app.kubernetes.io/name: elastic-agent
    app.kubernetes.io/part-of: elastic-stack
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - nodes
      - namespaces
      - events
      - services
      - configmaps
      - persistentvolumes
      - persistentvolumeclaims
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - events.k8s.io
    resources:
      - events
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - create
      - update

  - apiGroups:
      - extensions
    resources:
      - replicasets
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - apps
    resources:
      - statefulsets
      - deployments
      - replicasets
      - daemonsets
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - ""
    resources:
      - nodes/stats
    verbs:
      - get

  - apiGroups:
      - batch
    resources:
      - jobs
      - cronjobs
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - storage.k8s.io
    resources:
      - storageclasses
    verbs:
      - get
      - list
      - watch

  - nonResourceURLs:
      - /metrics
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: elastic-stack-elastic-agent
  labels:
    app.kubernetes.io/name: elastic-agent
    app.kubernetes.io/part-of: elastic-stack
subjects:
  - kind: ServiceAccount
    name: elastic-agent
    namespace: elastic-stack
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: elastic-stack-elastic-agent
---
apiVersion: agent.k8s.elastic.co/v1alpha1
kind: Agent
metadata:
  name: elastic-agent
  namespace: elastic-stack
  labels:
    app.kubernetes.io/name: elastic-agent
    app.kubernetes.io/part-of: elastic-stack
spec:
  version: 9.4.3
  mode: fleet
  policyID: eck-agent

  kibanaRef:
    name: hacwa

  fleetServerRef:
    name: fleet-server

  revisionHistoryLimit: 5

  daemonSet:
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 2

    podTemplate:
      metadata:
        labels:
          app.kubernetes.io/name: elastic-agent
          app.kubernetes.io/part-of: elastic-stack

      spec:
        serviceAccountName: elastic-agent
        automountServiceAccountToken: true
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet
        terminationGracePeriodSeconds: 30

        tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule

          - key: node-role.kubernetes.io/master
            operator: Exists
            effect: NoSchedule

          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule

        securityContext:
          runAsUser: 0
          runAsGroup: 0

        containers:
          - name: agent
            env:
              - name: NODE_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: spec.nodeName

            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: "1"
                memory: 1Gi
